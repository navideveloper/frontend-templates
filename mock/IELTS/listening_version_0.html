<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Computer-Delivered Listening Practice Test</title>
    <style>
        :root {
            --ielts-yellow: #f5c242;
            --ielts-black: #202124;
            --ielts-blue: #1a73e8;
            --ielts-light-blue: #f1f3f4;
            --ielts-gray-bg: #f8f9fa;
            --ielts-border: #dadce0;
            --text-color: #3c4043;
            --success-color: #137333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: var(--ielts-gray-bg);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: var(--ielts-black);
            color: #ffffff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 24px;
            border-bottom: 3px solid var(--ielts-yellow);
            z-index: 10;
            gap: 20px;
        }

        .test-title {
            font-size: 1rem;
            font-weight: bold;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-grow: 1;
            justify-content: flex-end;
        }

        .audio-container-header {
            width: 100%;
            max-width: 400px;
            display: flex;
            align-items: center;
        }

        .audio-container-header audio {
            width: 100%;
            height: 36px;
        }

        .timer-container {
            background-color: var(--ielts-yellow);
            color: var(--ielts-black);
            padding: 6px 16px;
            border-radius: 4px;
            font-size: 1.15rem;
            font-weight: bold;
            font-family: monospace;
            white-space: nowrap;
        }

        main {
            display: flex;
            flex: 1;
            overflow: hidden;
            background-color: #ffffff;
        }

        .test-content {
            flex: 1;
            background: #ffffff;
            padding: 30px 40px;
            overflow-y: auto;
            width: 100%;
        }

        .part-container {
            display: none;
            max-width: 1000px;
            margin: 0 auto;
        }

        .part-container.active {
            display: block;
        }

        .instructions {
            background-color: #e3f2fd;
            border-left: 4px solid var(--ielts-blue);
            padding: 12px;
            margin-bottom: 25px;
            font-style: italic;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .part-header {
            border-bottom: 2px solid var(--ielts-black);
            padding-bottom: 6px;
            margin-bottom: 16px;
        }

        .part-header h2 {
            font-size: 1.4rem;
            color: var(--ielts-black);
        }

        .question-group {
            margin-bottom: 30px;
        }

        .group-title {
            font-size: 1.1rem;
            margin-bottom: 15px;
            color: var(--ielts-black);
            font-weight: bold;
        }

        .question-row {
            margin: 16px 0;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 1rem;
            line-height: 1.6;
        }

        .static-row {
            margin: 12px 0;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 0.95rem;
            line-height: 1.6;
            color: #5f6368;
        }

        .input-wrapper {
            display: inline-flex;
            align-items: center;
            border: 1px solid var(--ielts-border);
            background: #ffffff;
            border-radius: 4px;
            padding: 2px 6px;
        }

        .q-number-inline {
            font-weight: bold;
            color: #5f6368;
            font-size: 0.85rem;
            margin-right: 6px;
            background: #e8eaed;
            padding: 2px 6px;
            border-radius: 3px;
        }

        input[type="text"] {
            border: none;
            padding: 4px;
            font-size: 1rem;
            width: 150px;
            outline: none;
            color: var(--ielts-blue);
            font-weight: normal;
        }

        .options-list {
            margin-left: 30px;
            margin-top: 10px;
        }

        .option-item {
            margin: 12px 0;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            cursor: pointer;
            font-size: 0.95rem;
        }

        .q-number-block {
            font-weight: bold;
            background: var(--ielts-black);
            color: #fff;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 0.85rem;
            margin-right: 8px;
        }

        .matching-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .matching-table th, .matching-table td {
            border: 1px solid var(--ielts-border);
            padding: 10px;
            text-align: center;
        }

        .matching-table th {
            background-color: #f1f3f4;
            color: var(--text-color);
            font-weight: bold;
        }

        .matching-table td:first-child {
            text-align: left;
            width: 50%;
        }

        .map-graphic-container {
            text-align: center;
            margin: 20px 0;
            background: #ffffff;
        }

        .map-image {
            max-width: 100%;
            max-height: 280px;
            height: auto;
            border: 1px solid var(--ielts-border);
            border-radius: 4px;
            object-fit: contain;
        }

        .map-dropdown-row {
            display: flex;
            align-items: center;
            margin: 12px 0;
            font-size: 0.95rem;
        }

        .map-select {
            padding: 6px 12px;
            font-weight: bold;
            color: var(--ielts-blue);
            border: 1px solid var(--ielts-border);
            border-radius: 4px;
            outline: none;
            margin-left: auto;
            width: 160px;
        }

        footer {
            background-color: var(--ielts-black);
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .part-switcher {
            display: flex;
            gap: 4px;
        }

        .part-btn {
            background-color: #3c4043;
            color: #ffffff;
            border: none;
            padding: 10px 18px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
            font-size: 0.85rem;
            transition: background 0.2s;
        }

        .part-btn.active {
            background-color: var(--ielts-yellow);
            color: var(--ielts-black);
        }

        .nav-buttons-container {
            display: flex;
            gap: 4px;
            overflow-x: auto;
            max-width: 50%;
            padding: 4px 0;
        }

        .q-nav-btn {
            background-color: #5f6368;
            color: #ffffff;
            border: none;
            padding: 6px 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.8rem;
            border-radius: 3px;
            min-width: 32px;
        }

        .q-nav-btn.answered {
            background-color: var(--ielts-blue);
            color: white;
        }

        .q-nav-btn.current-context {
            box-shadow: inset 0 0 0 2px var(--ielts-yellow);
        }

        .submit-btn {
            background-color: var(--success-color);
            color: white;
            border: none;
            padding: 10px 24px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            visibility: hidden;
            opacity: 0;
            transition: all 0.2s ease-out;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-window {
            background: #fff;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .modal-header {
            background: var(--ielts-black);
            color: #fff;
            padding: 16px 20px;
            font-size: 1.15rem;
            font-weight: bold;
            border-bottom: 3px solid var(--ielts-yellow);
        }

        .modal-body {
            padding: 24px;
            overflow-y: auto;
            flex: 1;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .modal-footer {
            background: #f1f3f4;
            padding: 12px 20px;
            text-align: right;
            border-top: 1px solid var(--ielts-border);
        }

        .modal-close-btn {
            background: var(--ielts-blue);
            color: white;
            border: none;
            padding: 8px 20px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
        }

        .report-item {
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px dashed var(--ielts-border);
        }
        .text-correct { color: #137333; font-weight: bold; }
        .text-incorrect { color: #c5221f; font-weight: bold; }
        
        .section-divider {
            border-top: 2px dashed var(--ielts-border);
            margin: 30px 0 20px 0;
        }
    </style>
</head>

    </footer>

        });

        function renderExamContent() {
            const wrapper = document.getElementById("test-view-wrapper");
            wrapper.innerHTML = "";

            Object.keys(examData).forEach((partKey, index) => {
                const partNum = index + 1;
                const part = examData[partKey];

                const partDiv = document.createElement("div");
                partDiv.className = `part-container`;
                partDiv.id = `part-view-block-${partNum}`;

                let contentHtml = `
                    <div class="part-header"><h2>Listening Part ${partNum}</h2></div>
                    <div class="instructions">${part.instructions}</div>
                    <div class="question-group">
                        <h3 class="group-title">${part.title}</h3>
                `;

                // Render main sections
                if (part.sections) {
                    part.sections.forEach(section => {
                        contentHtml += renderSection(section);
                    });
                }

                contentHtml += `</div>`;

                // Render extra sections
                if (part.extraSections) {
                    part.extraSections.forEach(extra => {
                        contentHtml += `<div class="section-divider"></div>`;
                        contentHtml += `<div class="instructions">${extra.instructions}</div>`;
                        contentHtml += `<h3 class="group-title">${extra.title}</h3>`;
                        
                        if (extra.sections) {
                            extra.sections.forEach(section => {
                                contentHtml += renderSection(section);
                            });
                        }
                    });
                }

                partDiv.innerHTML = contentHtml;
                wrapper.appendChild(partDiv);
            });
        }

        function renderSection(section) {
            let html = '';
            
            if (section.type === "mixed") {
                section.items.forEach(item => {
                    if (item.type === "static") {
                        html += `<div class="static-row">${item.text}</div>`;
                    } else if (item.type === "question") {
                        html += `
                            <div class="question-row">
                                <span>${item.prefix}</span>
                                <div class="input-wrapper">
                                    <span class="q-number-inline">${item.id}</span>
                                    <input type="text" data-q="${item.id}">
                                </div>
                                <span>${item.suffix}</span>
                            </div>
                        `;
                    }
                });
            } else if (section.type === "multiple-choice") {
                section.items.forEach(q => {
                    html += `
                        <div style="margin-bottom: 25px;">
                            <div class="question-row">
                                <span class="q-number-block">${q.id}</span> 
                                <strong>${q.question}</strong>
                            </div>
                            <div class="options-list">
                    `;
                    
                    q.options.forEach(opt => {
                        const charLabel = opt.substring(0, 1);
                        html += `
                            <label class="option-item">
                                <input type="radio" name="q_${q.id}" value="${charLabel}" data-q="${q.id}">
                                <span>${opt}</span>
                            </label>
                        `;
                    });
                    
                    html += `</div></div>`;
                });
            }
            
            return html;
        }

        function renderNavigationDock() {
            const dock = document.getElementById("nav-dock");
            dock.innerHTML = "";
            for (let i = 1; i <= totalQuestions; i++) {
                const b = document.createElement("button");
                b.className = "q-nav-btn";
                b.id = `nav-node-item-${i}`;
                b.innerText = i;
                b.onclick = () => jumpToQuestionTargetContext(i);
                dock.appendChild(b);
            }
        }

        function switchPart(partIndex) {
            currentActivePart = partIndex;
            for (let i = 1; i <= 4; i++) {
                const view = document.getElementById(`part-view-block-${i}`);
                const btn = document.getElementById(`part-btn-${i}`);
                if (view && btn) {
                    if (i === partIndex) {
                        view.classList.add("active");
                        btn.classList.add("active");
                    } else {
                        view.classList.remove("active");
                        btn.classList.remove("active");
                    }
                }
            }
            updateNavigationBorderHighlight();
        }

        function jumpToQuestionTargetContext(qNum) {
            let targetPart = 1;
            if (qNum >= 11 && qNum <= 20) targetPart = 2;
            if (qNum >= 21 && qNum <= 30) targetPart = 3;
            if (qNum >= 31) targetPart = 4;

            if (currentActivePart !== targetPart) switchPart(targetPart);

            setTimeout(() => {
                const field = document.querySelector(`[data-q="${qNum}"]`);
                if (field) {
                    field.scrollIntoView({ behavior: "smooth", block: "center" });
                    field.focus();
                }
            }, 100);
        }

        function updateNavigationBorderHighlight() {
            for (let i = 1; i <= totalQuestions; i++) {
                const btn = document.getElementById(`nav-node-item-${i}`);
                if (!btn) continue;
                
                let assignedPart = 1;
                if (i >= 11 && i <= 20) assignedPart = 2;
                if (i >= 21 && i <= 30) assignedPart = 3;
                if (i >= 31) assignedPart = 4;

                if (assignedPart === currentActivePart) {
                    btn.classList.add("current-context");
                } else {
                    btn.classList.remove("current-context");
                }
            }
        }

        function setupInputTrackingListeners() {
            const handleStateModification = (e) => {
                const qNum = e.target.getAttribute("data-q");
                if (!qNum) return;

                const navBtn = document.getElementById(`nav-node-item-${qNum}`);
                if (!navBtn) return;

                let hasValue = false;
                if (e.target.tagName === "INPUT" && e.target.type === "text") {
                    hasValue = e.target.value.trim() !== "";
                } else if (e.target.tagName === "INPUT" && e.target.type === "radio") {
                    hasValue = e.target.checked;
                } else if (e.target.tagName === "SELECT") {
                    hasValue = e.target.value !== "";
                }

                if (hasValue) navBtn.classList.add("answered");
                else navBtn.classList.remove("answered");
            };

            document.addEventListener("input", handleStateModification);
            document.addEventListener("change", handleStateModification);
        }

        let operationalSecondsRemaining = 30 * 60; 
        let internalTimerThreadRef = null;

        function initializeTimerSystem() {
            const display = document.getElementById("timer");
            internalTimerThreadRef = setInterval(() => {
                let m = Math.floor(operationalSecondsRemaining / 60);
                let s = operationalSecondsRemaining % 60;
                display.innerText = `${m < 10 ? "0" + m : m}:${s < 10 ? "0" + s : s}`;

                if (operationalSecondsRemaining <= 0) {
                    clearInterval(internalTimerThreadRef);
                    submitTest();
                }
                operationalSecondsRemaining--;
            }, 1000);
        }

        function submitTest() {
            if (internalTimerThreadRef) clearInterval(internalTimerThreadRef);
            
            let rawScore = 0;
            let feedbackLogHtml = `<div>`;
            
            for (let i = 1; i <= totalQuestions; i++) {
                let userVal = "";
                const textField = document.querySelector(`input[data-q="${i}"][type="text"]`);
                const selectField = document.querySelector(`select[data-q="${i}"]`);
                const checkedRadio = document.querySelector(`input[data-q="${i}"][type="radio"]:checked`);

                if (textField) userVal = textField.value.trim().toLowerCase();
                else if (selectField) userVal = selectField.value.trim().toLowerCase();
                else if (checkedRadio) userVal = checkedRadio.value.trim().toLowerCase();

                const correctTarget = answerKey[i].toString().toLowerCase();
                const cleanDisplayUserVal = userVal || "[Blank]";

                if (userVal === correctTarget) {
                    rawScore++;
                    feedbackLogHtml += `
                        <div class="report-item">
                            <span class="q-number-inline">${i}</span> <span class="text-correct">Correct</span> — Value: "${cleanDisplayUserVal}"
                        </div>
                    `;
                } else {
                    feedbackLogHtml += `
                        <div class="report-item">
                            <span class="q-number-inline">${i}</span> <span class="text-incorrect">Incorrect</span> — Your Answer: "${cleanDisplayUserVal}" | Correct: "${correctTarget}"
                        </div>
                    `;
                }
            }

            let bandScore = 4.0;
            if (rawScore >= 39) bandScore = 9.0;
            else if (rawScore >= 37) bandScore = 8.5;
            else if (rawScore >= 35) bandScore = 8.0;
            else if (rawScore >= 32) bandScore = 7.5;
            else if (rawScore >= 30) bandScore = 7.0;
            else if (rawScore >= 26) bandScore = 6.5;
            else if (rawScore >= 23) bandScore = 6.0;
            else if (rawScore >= 18) bandScore = 5.5;
            else if (rawScore >= 14) bandScore = 5.0;

            let finalSummaryPrefixHtml = `
                <p style="font-size:1.1rem; margin-bottom:10px;">Score Matrix: <strong>${rawScore} / 40</strong> Answers Verified.</p>
                <div style="background:var(--ielts-yellow); color:#000; padding:12px; font-weight:bold; font-size:1.2rem; text-align:center; border-radius:4px; margin-bottom:20px;">
                    Estimated Performance Scale: Band ${bandScore}
                </div>
                <h4 style="margin-bottom:15px; border-bottom:1px solid var(--ielts-border); padding-bottom:5px;">Review Log Summary:</h4>
            `;

            feedbackLogHtml += `</div>`;
            document.getElementById("modal-report-content").innerHTML = finalSummaryPrefixHtml + feedbackLogHtml;
            document.getElementById("score-modal").classList.add("active");
        }

        function closeModal() {
            document.getElementById("score-modal").classList.remove("active");
        }
    </script>
</body>
</html>
