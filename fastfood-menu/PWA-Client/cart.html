<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"/>
    <title>LesAiles — Savat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f4f0;
            --surface: #ffffff;
            --surface2: #f0eeea;
            --primary: #d4451f;
            --primary-light: #fdf0ec;
            --text: #1c1b18;
            --text2: #7a7872;
            --text3: #b5b3ae;
            --border: rgba(28,27,24,0.08);
            --danger-bg: rgba(212, 69, 31, 0.1);
            --danger-text: #d4451f;
            --r-sm: 12px;
            --r-md: 16px;
            --r-lg: 22px;
            --r-xl: 28px;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #141310;
                --surface: #1e1d1a;
                --surface2: #272522;
                --primary-light: #2a1a15;
                --text: #f0ede6;
                --text2: #9a9790;
                --text3: #5a5852;
                --border: rgba(240,237,230,0.07);
                --danger-bg: rgba(240, 78, 39, 0.15);
                --danger-text: #ff5c33;
            }
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; }
        body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; }

        .app { max-width:430px; margin:0 auto; min-height:100vh; padding-bottom:220px; position: relative; }

        /* HEADER FIX */
        .header-wrapper {
            position: sticky; top: 0; z-index: 200;
            background: rgba(245,244,240,0.88);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--border);
        }
        @media (prefers-color-scheme:dark) { .header-wrapper { background:rgba(20,19,16,0.88); } }

        .header {
            max-width: 430px; margin: 0 auto;
            padding: 14px 16px;
            display: flex; align-items: center; justify-content: space-between;
        }

        .brand { display:flex; align-items:center; gap:12px; }
        .back-btn {
            background: none; border: none; color: var(--text);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            text-decoration: none; padding: 4px; margin-left: -4px;
            transition: transform 0.2s ease;
        }
        /* Mobile-first: Active states rule over hover */
        .back-btn:active { transform: scale(0.9); }
        .back-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2.5; }
        .brand-text h1 { font-size:18px; font-weight:700; letter-spacing:-0.3px; line-height:1; }

        .cart-status {
            display:flex; align-items:center; gap:6px;
            background:var(--surface2); color:var(--text);
            padding:9px 14px; border-radius:100px;
            font-size:13px; font-weight:600;
        }
        .cart-status svg { width:16px; height:16px; stroke:currentColor; fill:none; stroke-width:2.2; }

        /* CART CONTENT */
        .cart-page { padding: 16px; }

        .cart-item {
            display: flex; background: var(--surface);
            border-radius: var(--r-lg); border: 1px solid var(--border);
            padding: 12px; margin-bottom: 12px;
            transition: transform 0.2s ease, opacity 0.2s ease, margin 0.2s ease;
        }
        
        /* Removal Animation State */
        .cart-item.removing {
            transform: scale(0.9) translateX(-20px);
            opacity: 0;
            margin-bottom: -100px; /* Collapses the height footprint smoothly */
            pointer-events: none;
        }

        .cart-item-image {
            width: 80px; height: 80px; border-radius: var(--r-sm);
            object-fit: cover; background: var(--surface2);
            margin-right: 12px; flex-shrink: 0;
        }
        .cart-item-details { flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .cart-item-title { font-size: 15px; font-weight: 600; line-height: 1.3; margin-bottom: 2px; }
        .cart-item-price { font-size: 14px; font-weight: 700; color: var(--primary); margin-bottom: 8px; }
        
        .cart-item-controls { display: flex; align-items: center; justify-content: space-between; gap: 8px; }

        /* REMOVE BUTTON */
        .cart-item-remove {
            background: var(--danger-bg); color: var(--danger-text);
            border: none; cursor: pointer; padding: 8px 12px;
            border-radius: var(--r-sm); font-size: 12px; font-weight: 600;
            display: flex; align-items: center; gap: 4px; 
            transition: background-color 0.15s, transform 0.1s;
        }
        .cart-item-remove:active { transform: scale(0.95); opacity: 0.8; }
        .cart-item-remove svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2.2; }

        /* QUANTITY CONTROL */
        .qty-ctrl {
            display: flex; align-items: center; justify-content: space-between;
            background: var(--primary); border-radius: var(--r-sm);
            padding: 3px; height: 34px; gap: 8px;
        }
        .qty-btn {
            background: #fff; border: none; cursor: pointer;
            width: 28px; height: 28px; border-radius: 8px;
            font-size: 14px; font-weight: 700; color: var(--primary);
            display: flex; align-items: center; justify-content: center; line-height: 1;
            transition: transform 0.1s, background-color 0.15s;
        }
        .qty-btn:active { transform: scale(0.9); background-color: var(--surface2); }
        .qty-val { color: #fff; font-size: 13px; font-weight: 700; min-width: 14px; text-align: center; }

        /* STICKY ORDER SUMMARY FOOTER */
        .order-summary {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 430px;
            background: rgba(245,244,240,0.92);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border-top: 1px solid var(--border);
            padding: 16px 16px 28px; z-index: 200;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s;
        }
        @media (prefers-color-scheme:dark) { .order-summary { background:rgba(20,19,16,0.92); } }

        /* Summary slide down animation when cart goes empty */
        .order-summary.hidden {
            transform: translate(-50%, 100%);
            opacity: 0;
            pointer-events: none;
        }

        .summary-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; }
        .summary-label { color: var(--text2); }
        .summary-value { font-weight: 600; color: var(--text); }

        .total-row { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
        .total-label { font-weight: 700; font-size: 15px; color: var(--text); }
        .total-value { font-weight: 800; color: var(--primary); font-size: 18px; }

        .checkout-button {
            width: 100%; background-color: var(--text); color: var(--surface);
            border: none; padding: 14px; border-radius: var(--r-md);
            font-size: 15px; font-weight: 700; margin-top: 14px;
            cursor: pointer; transition: background-color 0.15s, transform 0.1s;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .checkout-button:active { transform: scale(0.98); opacity: 0.9; }

        /* EMPTY STATE STYLE */
        .empty-cart { 
            text-align: center; padding: 80px 20px; color: var(--text2);
            display: none; animation: fadeIn 0.4s ease forwards;
        }
        .empty-cart svg { width: 56px; height: 56px; stroke: var(--text3); fill: none; stroke-width: 1.5; margin-bottom: 16px; }
        .empty-cart p { font-size: 15px; margin-bottom: 24px; color: var(--text2); }
        .back-to-menu {
            display: inline-flex; background: var(--primary); color: #fff;
            padding: 12px 28px; border-radius: 100px; font-size: 14px;
            font-weight: 600; text-decoration: none; transition: transform 0.15s, opacity 0.15s;
        }
        .back-to-menu:active { transform: scale(0.95); opacity: 0.9; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Desktop Hover refinements (Only triggered if pointing device supports hover) */
        @media (hover: hover) {
            .back-btn:hover { color: var(--primary); }
            .cart-item-remove:hover { background-color: var(--primary); color: #fff; }
            .qty-btn:hover { background-color: var(--primary-light); }
            .checkout-button:hover { background-color: var(--primary); color: #fff; }
            .back-to-menu:hover { opacity: 0.9; }
        }
    </style>
</head>
<body>
<div class="app">

    <div class="header-wrapper">
        <header class="header">
            <div class="brand">
                <a href="index.html" class="back-btn">
                    <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                </a>
                <div class="brand-text">
                    <h1>Savat</h1>
                </div>
            </div>
            <div class="cart-status">
                <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
                Buyurtma
            </div>
        </header>
    </div>

    <main class="cart-page">
        <div class="cart-items-container" id="items-container">
            
            <div class="cart-item" data-price="28000">
                <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?q=80&w=400&auto=format&fit=crop" alt="GamBurger" class="cart-item-image">
                <div class="cart-item-details">
                    <div>
                        <h3 class="cart-item-title">GamBurger</h3>
                        <p class="cart-item-price">28 000 so'm</p>
                    </div>
                    <div class="cart-item-controls">
                        <button class="cart-item-remove">
                            <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                            O'chirish
                        </button>
                        <div class="qty-ctrl">
                            <button class="qty-btn decrease">−</button>
                            <span class="qty-val">1</span>
                            <button class="qty-btn increase">+</button>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="cart-item" data-price="7000">
                <img src="https://images.unsplash.com/photo-1622483767028-3f66f32aef97?q=80&w=400&auto=format&fit=crop" alt="Cola" class="cart-item-image">
                <div class="cart-item-details">
                    <div>
                        <h3 class="cart-item-title">Cola 0.5</h3>
                        <p class="cart-item-price">7 000 so'm</p>
                    </div>
                    <div class="cart-item-controls">
                        <button class="cart-item-remove">
                            <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                            O'chirish
                        </button>
                        <div class="qty-ctrl">
                            <button class="qty-btn decrease">−</button>
                            <span class="qty-val">2</span>
                            <button class="qty-btn increase">+</button>
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <div class="empty-cart" id="empty-state">
            <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
            <p>Savatingiz hozircha bo'sh</p>
            <a href="index.html" class="back-to-menu">Menuga qaytish</a>
        </div> 
        
        <div class="order-summary" id="summary-sheet">
            <div class="summary-row">
                <span class="summary-label">Mahsulotlar</span>
                <span class="summary-value" id="subtotal-val">0 so'm</span>
            </div>
            <div class="summary-row">
                <span class="summary-label">Yetkazib berish</span>
                <span class="summary-value" id="delivery-val">10 000 so'm</span>
            </div>
            <div class="summary-row total-row">
                <span class="summary-label total-label">Jami</span>
                <span class="summary-value total-value" id="total-val">0 so'm</span>
            </div>
            <button class="checkout-button">Buyurtma berish</button>
        </div>
    </main>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const deliveryPrice = 10000;
    const itemsContainer = document.getElementById('items-container');
    const emptyState = document.getElementById('empty-state');
    const summarySheet = document.getElementById('summary-sheet');
    
    const subtotalEl = document.getElementById('subtotal-val');
    const totalEl = document.getElementById('total-val');

    // Utility function to convert numbers into neat spaced strings: e.g. 45000 -> "45 000 so'm"
    const formatPrice = (amount) => {
        return amount.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ") + " so'm";
    };

    // Calculate totals based on active UI items
    const calculateTotals = () => {
        const remainingItems = document.querySelectorAll('.cart-item:not(.removing)');
        
        if (remainingItems.length === 0) {
            // Trigger seamless transition adjustments for empty cart scenario
            summarySheet.classList.add('hidden');
            emptyState.style.display = 'block';
            return;
        }

        let subtotal = 0;
        remainingItems.forEach(item => {
            const price = parseInt(item.dataset.price, 10);
            const quantity = parseInt(item.querySelector('.qty-val').textContent, 10);
            subtotal += price * quantity;
        });

        const total = subtotal + deliveryPrice;

        subtotalEl.textContent = formatPrice(subtotal);
        totalEl.textContent = formatPrice(total);
    };

    // Orchestrates removal step animations gracefully before destroying DOM structures
    const animateItemRemoval = (itemNode) => {
        itemNode.classList.add('removing');
        // Matches the 0.2s duration of CSS configurations
        setTimeout(() => {
            itemNode.remove();
            calculateTotals();
        }, 200);
    };

    // Attach click triggers cleanly to cart actions
    document.querySelectorAll('.cart-item').forEach(item => {
        const decBtn = item.querySelector('.decrease');
        const incBtn = item.querySelector('.increase');
        const qtyVal = item.querySelector('.qty-val');
        const removeBtn = item.querySelector('.cart-item-remove');

        incBtn.addEventListener('click', () => {
            let count = parseInt(qtyVal.textContent, 10);
            count++;
            qtyVal.textContent = count;
            calculateTotals();
        });

        decBtn.addEventListener('click', () => {
            let count = parseInt(qtyVal.textContent, 10);
            if (count > 1) {
                count--;
                qtyVal.textContent = count;
                calculateTotals();
            } else {
                animateItemRemoval(item);
            }
        });

        removeBtn.addEventListener('click', () => {
            animateItemRemoval(item);
        });
    });

    calculateTotals();
});
</script>
</body>
</html>
