<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IELTS Computer-Delivered Listening Practice Test</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --yellow: #f5c118;
  --black: #111318;
  --blue: #1757c2;
  --blue-light: #eef2fc;
  --green: #0e6630;
  --red: #b5190f;
  --border: #d0d5e0;
  --bg: #f4f5f8;
  --white: #ffffff;
  --text: #1e2130;
  --muted: #5f6678;
  --primary: #f5c118;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  font-size: 15px;
}

/* ─── HEADER ─── */
header {
  background: var(--black);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  height: 54px;
  border-bottom: 3px solid var(--primary);
  flex-shrink: 0;
  gap: 16px;
}
.logo {
  font-family: var(--mono);
  font-weight: 700;
  font-size: 1rem;
  color: var(--white);
  letter-spacing: 0.04em;
  white-space: nowrap;
}
.logo span { color: var(--primary); }
.header-center {
  flex: 1;
  max-width: 420px;
}
.header-center audio { width: 100%; height: 32px; }
.timer {
  font-family: var(--mono);
  font-weight: 700;
  font-size: 1.2rem;
  background: var(--primary);
  color: var(--black);
  padding: 5px 16px;
  border-radius: 3px;
  letter-spacing: 0.06em;
  white-space: nowrap;
}

/* ─── MAIN LAYOUT ─── */
main {
  display: flex;
  flex: 1;
  overflow: hidden;
}
.test-content {
  flex: 1;
  overflow-y: auto;
  padding: 28px 36px;
  background: var(--white);
}
.part-block { display: none; max-width: 860px; margin: 0 auto; }
.part-block.active { display: block; }

/* ─── PART SECTIONS ─── */
.part-head {
  display: flex;
  align-items: baseline;
  gap: 14px;
  border-bottom: 2px solid var(--black);
  padding-bottom: 8px;
  margin-bottom: 18px;
}
.part-head h2 { font-family: var(--mono); font-size: 1.3rem; font-weight: 700; }
.part-head .part-tag {
  background: var(--black);
  color: var(--primary);
  font-family: var(--mono);
  font-size: 0.7rem;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 2px;
  letter-spacing: 0.08em;
}
.instructions {
  background: var(--blue-light);
  border-left: 4px solid var(--blue);
  padding: 10px 14px;
  font-size: 1rem;
  line-height: 1.55;
  margin-bottom: 20px;
  border-radius: 0 4px 4px 0;
  font-style: italic;
}
.section-title {
  font-weight: 700;
  font-size: 1rem;
  margin-bottom: 14px;
  color: var(--black);
}
.section-divider {
  border: none;
  border-top: 2px dashed var(--border);
  margin: 28px 0 20px;
}
.q-group { margin-bottom: 28px; }

/* ─── Q-NUMBER BADGE ─── */
.qn {
  display: inline-block;
  font-family: var(--mono);
  font-size: 0.72rem;
  font-weight: 700;
  background: #e8eaed;
  color: var(--muted);
  padding: 2px 6px;
  border-radius: 3px;
  margin-right: 5px;
}
.qn-dark {
  background: var(--black);
  color: var(--white);
}

/* ─── FORM / NOTE / SENTENCE / SUMMARY / FLOW / TABLE completion ─── */
.mixed-row {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 6px;
  margin: 11px 0;
  line-height: 1.7;
}
.static-row {
  margin: 9px 0;
  color: var(--muted);
  font-size: 0.9rem;
  line-height: 1.6;
}
.input-wrap {
  display: inline-flex;
  align-items: center;
  border: 1.5px solid var(--border);
  border-radius: 4px;
  background: var(--white);
  padding: 1px 5px;
  transition: border-color 0.15s;
}
.input-wrap:focus-within { border-color: var(--blue); }
input[type="text"] {
  border: none;
  outline: none;
  font-family: var(--sans);
  font-size: 0.95rem;
  width: 140px;
  padding: 4px 3px;
  color: var(--blue);
  font-weight: 600;
  background: transparent;
}

/* ─── TABLE COMPLETION ─── */
.completion-table {
  width: 100%;
  border-collapse: collapse;
  margin: 14px 0 24px;
  font-size: 0.9rem;
}
.completion-table th, .completion-table td {
  border: 1.5px solid var(--border);
  padding: 9px 12px;
  text-align: left;
  vertical-align: middle;
}
.completion-table th {
  background: var(--black);
  color: var(--white);
  font-family: var(--mono);
  font-size: 0.8rem;
  font-weight: 600;
  letter-spacing: 0.04em;
}
.completion-table tr:nth-child(even) td { background: var(--bg); }

/* ─── FLOWCHART ─── */
.flowchart {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  margin: 16px 0;
}
.flow-step {
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 6px;
  padding: 12px 20px;
  width: 100%;
  max-width: 520px;
  font-size: 0.95rem;
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 6px;
  line-height: 1.7;
}
.flow-step.decision {
  background: #fffce6;
  border-color: var(--primary);
  border-radius: 50px;
}
.flow-arrow {
  font-size: 1.5rem;
  color: var(--muted);
  line-height: 1;
  margin: 2px 0;
}

/* ─── MAP / DIAGRAM LABEL ─── */
.diagram-wrap {
  position: relative;
  display: inline-block;
  margin: 14px 0;
}
.diagram-wrap img { display: block; max-width: 100%; border: 1.5px solid var(--border); border-radius: 4px; }
.map-labels { margin: 12px 0; }
.map-label-row {
  display: flex;
  align-items: center;
  margin: 9px 0;
  font-size: 0.95rem;
  gap: 8px;
}
.map-label-letter {
  font-family: var(--mono);
  font-weight: 700;
  font-size: 0.85rem;
  background: var(--blue);
  color: var(--white);
  width: 26px;
  height: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  flex-shrink: 0;
}
select.map-select, select.dropdown-select {
  border: 1.5px solid var(--border);
  border-radius: 4px;
  padding: 5px 10px;
  font-family: var(--sans);
  font-size: 0.9rem;
  color: var(--blue);
  font-weight: 600;
  outline: none;
  background: var(--white);
  cursor: pointer;
  min-width: 160px;
  transition: border-color 0.15s;
}
select.map-select:focus, select.dropdown-select:focus { border-color: var(--blue); }

/* ─── MULTIPLE CHOICE ─── */
.mc-item { margin-bottom: 22px; }
.mc-question {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 10px;
  font-weight: 600;
  line-height: 1.55;
}
.options-list { margin-left: 38px; }
.option-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin: 9px 0;
  cursor: pointer;
  font-size: 0.95rem;
  line-height: 1.5;
}
.option-item input[type="radio"],
.option-item input[type="checkbox"] {
  margin-top: 2px;
  accent-color: var(--blue);
  cursor: pointer;
  width: 16px;
  height: 16px;
  flex-shrink: 0;
}

/* ─── PICK FROM LIST (multi-select long) ─── */
.pick-list { display: flex; flex-direction: column; gap: 8px; margin: 12px 0 12px 10px; }
.pick-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  font-size: 0.95rem;
  cursor: pointer;
  line-height: 1.5;
}

/* ─── MATCHING ─── */
.matching-grid { margin: 14px 0; }
.matching-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 9px 0;
  font-size: 0.95rem;
}
.matching-statement { flex: 1; }
.matching-options { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0 14px 20px; font-size: 0.85rem; color: var(--muted); font-style: italic; }

/* ─── CLASSIFICATION ─── */
.classification-table {
  width: 100%;
  border-collapse: collapse;
  margin: 14px 0;
  font-size: 0.9rem;
}
.classification-table th, .classification-table td {
  border: 1.5px solid var(--border);
  padding: 9px 12px;
  vertical-align: middle;
}
.classification-table th {
  background: var(--blue);
  color: var(--white);
  font-family: var(--mono);
  font-size: 0.8rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-align: center;
}
.classification-table td:first-child { font-weight: 600; }

/* ─── SHORT ANSWER ─── */
.short-answer-item { margin: 14px 0; display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }

/* ─── FOOTER ─── */
footer {
  background: var(--black);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  flex-shrink: 0;
}
.part-tabs { display: flex; gap: 4px; }
.part-tab {
  background: #2d3142;
  color: #aeb4c8;
  border: none;
  padding: 8px 16px;
  cursor: pointer;
  font-family: var(--mono);
  font-weight: 700;
  font-size: 0.8rem;
  border-radius: 3px;
  letter-spacing: 0.04em;
  transition: all 0.15s;
}
.part-tab:hover { background: #3d4260; color: var(--white); }
.part-tab.active { background: var(--primary); color: var(--black); }

.q-dock {
  display: flex;
  gap: 3px;
  flex-wrap: nowrap;
  overflow-x: auto;
  max-width: 55%;
}
.q-btn {
  background: #3c4260;
  color: #aeb4c8;
  border: none;
  padding: 5px 8px;
  cursor: pointer;
  font-family: var(--mono);
  font-size: 0.75rem;
  font-weight: 700;
  border-radius: 3px;
  min-width: 30px;
  line-height: 1.4;
  transition: all 0.12s;
}
.q-btn.answered { background: var(--blue); color: var(--white); }
.q-btn.current { box-shadow: inset 0 0 0 2px var(--primary); }

.submit-btn {
  background: var(--green);
  color: var(--white);
  border: none;
  padding: 9px 22px;
  font-family: var(--mono);
  font-size: 0.85rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  cursor: pointer;
  border-radius: 4px;
  white-space: nowrap;
  transition: background 0.15s;
}
.submit-btn:hover { background: #0b521e; }

/* ─── MODAL ─── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9000;
  visibility: hidden;
  opacity: 0;
  transition: all 0.2s;
}
.modal-overlay.active { visibility: visible; opacity: 1; }
.modal-box {
  background: var(--white);
  width: 92%;
  max-width: 620px;
  max-height: 82vh;
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
}
.modal-head {
  background: var(--black);
  color: var(--white);
  padding: 16px 22px;
  font-family: var(--mono);
  font-size: 1rem;
  font-weight: 700;
  border-bottom: 3px solid var(--primary);
  letter-spacing: 0.04em;
}
.modal-body {
  padding: 22px;
  overflow-y: auto;
  flex: 1;
  font-size: 0.9rem;
  line-height: 1.6;
}
.modal-foot {
  background: var(--bg);
  padding: 12px 22px;
  text-align: right;
  border-top: 1px solid var(--border);
}
.modal-close {
  background: var(--blue);
  color: var(--white);
  border: none;
  padding: 8px 20px;
  font-family: var(--mono);
  font-weight: 700;
  cursor: pointer;
  border-radius: 4px;
  font-size: 0.85rem;
}
.report-row {
  margin-bottom: 8px;
  padding-bottom: 8px;
  border-bottom: 1px dashed var(--border);
  display: flex;
  align-items: baseline;
  gap: 8px;
  flex-wrap: wrap;
}
.ok { color: var(--green); font-weight: 700; }
.no { color: var(--red); font-weight: 700; }
.band-badge {
  background: var(--primary);
  color: var(--black);
  font-family: var(--mono);
  font-weight: 700;
  font-size: 1.3rem;
  text-align: center;
  padding: 12px;
  border-radius: 5px;
  margin-bottom: 20px;
}
</style>
</head>
<body>

<header>
  <div class="logo">IELTS <span>LISTENING</span></div>
  <div class="header-center">
    <audio controls>
      <source src="./ielts-practice-listening.mp3" type="audio/mpeg">
      Your browser does not support audio.
    </audio>
  </div>
  <div class="timer" id="timer">30:00</div>
</header>

<main>
  <section class="test-content" id="test-content"></section>
</main>

<footer>
  <div class="part-tabs" id="part-tabs"></div>
  <div class="q-dock" id="q-dock"></div>
  <button class="submit-btn" onclick="submitTest()">Finish</button>
</footer>

<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-head">Test Results Summary</div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-foot">
      <button class="modal-close" onclick="closeModal()">Review Answers</button>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════════

   Supported section types:
     "form"           → Note/Form/Sentence/Summary completion (mixed static + question rows)
     "table"          → Table completion
     "flowchart"      → Flowchart/sequence completion
     "diagram"        → Map/diagram label (label list with selects or text)
     "multiple-choice"→ MCQ single answer (A/B/C)
     "multi-select"   → MCQ multiple answers (pick N from list)
     "pick-from-list" → Pick from a longer list (checkbox)
     "matching"       → Match items to a set of options
     "classification" → Classify items into categories
     "short-answer"   → Short WH-answer text boxes

  /* ══════ PART 2 ══════ */

  /* ══════ PART 4 ══════ */

/* ═══════════════ RENDERING ENGINE ═══════════════ */

let currentPart = 1;
const totalParts = EXAM.length;

function buildInputWrap(id) {
  return `<div class="input-wrap"><span class="qn">${id}</span><input type="text" data-q="${id}" autocomplete="off"></div>`;
}

function renderForm(section) {
  let h = '';
  (section.items || []).forEach(item => {
    if (item.type === 'static') {
      h += `<div class="static-row">${item.text}</div>`;
    } else if (item.type === 'divider') {
      h += `<hr class="section-divider" style="margin:14px 0 10px">`;
    } else if (item.type === 'q') {
      h += `<div class="mixed-row">${item.prefix}${buildInputWrap(item.id)}${item.suffix}</div>`;
    }
  });
  return h;
}

function renderTable(section) {
  let h = `<table class="completion-table"><thead><tr>`;
  section.headers.forEach(hd => { h += `<th>${hd}</th>`; });
  h += `</tr></thead><tbody>`;
  section.rows.forEach(row => {
    h += `<tr>`;
    row.cells.forEach(cell => {
      if (typeof cell === 'string') {
        h += `<td>${cell}</td>`;
      } else if (cell.type === 'q') {
        h += `<td>${cell.prefix}${buildInputWrap(cell.id)}${cell.suffix}</td>`;
      }
    });
    h += `</tr>`;
  });
  h += `</tbody></table>`;
  return h;
}

function renderFlowchart(section) {
  let h = `<div class="flowchart">`;
  section.steps.forEach((step, i) => {
    if (step.type === 'step') {
      h += `<div class="flow-step"><strong>${step.text}</strong></div>`;
    } else if (step.type === 'q-step') {
      h += `<div class="flow-step">${step.prefix}${buildInputWrap(step.id)}${step.suffix}</div>`;
    } else if (step.type === 'sub') {
      h += `<div class="flow-step" style="background:#f8f9fa;font-size:0.88rem;flex-direction:column;align-items:flex-start;gap:4px;">`;
      step.items.forEach(sub => {
        if (typeof sub === 'string') {
          h += `<div>${sub}</div>`;
        } else if (sub.type === 'q-sub') {
          h += `<div class="mixed-row" style="margin:2px 0">${sub.prefix}${buildInputWrap(sub.id)}${sub.suffix}</div>`;
        }
      });
      h += `</div>`;
    }
    if (i < section.steps.length - 1) h += `<div class="flow-arrow">↓</div>`;
  });
  h += `</div>`;
  return h;
}

function renderMultipleChoice(section) {
  let h = '';
  section.items.forEach(q => {
    h += `<div class="mc-item">
      <div class="mc-question"><span class="qn qn-dark">${q.id}</span><span>${q.question}</span></div>
      <div class="options-list">`;
    q.options.forEach(opt => {
      const val = opt[0];
      h += `<label class="option-item">
        <input type="radio" name="q_${q.id}" value="${val}" data-q="${q.id}">
        <span>${opt}</span>
      </label>`;
    });
    h += `</div></div>`;
  });
  return h;
}

function renderMultiSelect(section) {
  const nameKey = `q_ms_${section.questionId}`;
  let h = `<p style="margin-bottom:10px;font-weight:600;">Select exactly ${section.pickCount}:</p><div class="pick-list">`;
  section.options.forEach(opt => {
    const val = opt[0];
    h += `<label class="pick-item">
      <input type="checkbox" name="${nameKey}" value="${val}" data-ms-group="${section.questionId}" data-ms-count="${section.pickCount}">
      <span>${opt}</span>
    </label>`;
  });
  h += `</div>`;
  return h;
}

function renderPickFromList(section) {
  const nameKey = `q_pfl_${section.ids.join('_')}`;
  let h = `<p style="margin-bottom:10px;font-weight:600;">Select exactly ${section.pickCount}:</p><div class="pick-list">`;
  section.options.forEach(opt => {
    const val = opt[0];
    h += `<label class="pick-item">
      <input type="checkbox" name="${nameKey}" value="${val}" data-pfl-ids="${section.ids.join(',')}" data-pfl-count="${section.pickCount}">
      <span>${opt}</span>
    </label>`;
  });
  h += `</div>`;
  return h;
}

function renderMatching(section) {
  let h = `<div class="matching-options">${section.options.join(' &nbsp;|&nbsp; ')}</div><div class="matching-grid">`;
  section.items.forEach(item => {
    if (item.noAnswer) {
      h += `<div class="matching-row"><span class="qn qn-dark" style="opacity:0.3">${item.id}</span><span class="matching-statement">${item.statement}</span><em style="color:var(--muted);font-size:0.85rem">(no answer required)</em></div>`;
    } else {
      h += `<div class="matching-row">
        <span class="qn qn-dark">${item.id}</span>
        <span class="matching-statement">${item.statement}</span>
        <select class="dropdown-select" data-q="${item.id}">
          <option value="">Select...</option>
          ${section.options.map(o => `<option value="${o[0]}">${o}</option>`).join('')}
        </select>
      </div>`;
    }
  });
  h += `</div>`;
  return h;
}

function renderClassification(section) {
  let h = `<div class="matching-options">${section.categories.join(' &nbsp;|&nbsp; ')}</div><table class="classification-table"><thead><tr><th>Item</th><th>Category (select)</th></tr></thead><tbody>`;
  section.items.forEach(item => {
    h += `<tr><td><span class="qn qn-dark">${item.id}</span> ${item.label}</td>
    <td><select class="dropdown-select" data-q="${item.id}">
      <option value="">Select...</option>
      ${section.categories.map(c => `<option value="${c[0]}">${c}</option>`).join('')}
    </select></td></tr>`;
  });
  h += `</tbody></table>`;
  return h;
}

function renderDiagram(section) {
  let h = '';
  if (section.diagramSrc) {
    h += `<div class="diagram-wrap"><img src="${section.diagramSrc}" alt="${section.diagramAlt}" class="map-image"></div>`;
  } else {
    h += `<div style="border:2px dashed var(--border);border-radius:6px;padding:30px;text-align:center;color:var(--muted);margin:14px 0;font-style:italic;">[Map/Diagram Image Placeholder: ${section.diagramAlt}]</div>`;
  }
  h += `<div class="map-labels">`;
  section.items.forEach(item => {
    h += `<div class="map-label-row">
      <span class="qn qn-dark">${item.id}</span>
      <span style="flex:1">${item.locationLabel}</span>
      <select class="map-select" data-q="${item.id}">
        <option value="">Select label...</option>
        ${section.labelChoices.map(c => `<option value="${c[0]}">${c}</option>`).join('')}
      </select>
    </div>`;
  });
  h += `</div>`;
  return h;
}

function renderShortAnswer(section) {
  let h = '';
  section.items.forEach(item => {
    h += `<div class="short-answer-item">
      <span class="qn qn-dark">${item.id}</span>
      <strong>${item.question}</strong>
      ${buildInputWrap(item.id)}
    </div>`;
  });
  return h;
}

function renderSection(sec) {
  let h = '';
  if (sec.instructions) h += `<div class="instructions">${sec.instructions}</div>`;
  if (sec.title) h += `<div class="section-title">${sec.title}</div>`;
  switch (sec.type) {
    case 'form':          h += renderForm(sec); break;
    case 'table':         h += renderTable(sec); break;
    case 'flowchart':     h += renderFlowchart(sec); break;
    case 'multiple-choice': h += renderMultipleChoice(sec); break;
    case 'multi-select':  h += renderMultiSelect(sec); break;
    case 'pick-from-list': h += renderPickFromList(sec); break;
    case 'matching':      h += renderMatching(sec); break;
    case 'classification': h += renderClassification(sec); break;
    case 'diagram':       h += renderDiagram(sec); break;
    case 'short-answer':  h += renderShortAnswer(sec); break;
    default: h += `<p style="color:var(--red)">Unknown section type: ${sec.type}</p>`;
  }
  return h;
}

function buildAllParts() {
  const container = document.getElementById('test-content');
  const tabsEl = document.getElementById('part-tabs');
  container.innerHTML = '';
  tabsEl.innerHTML = '';

  EXAM.forEach((part, idx) => {
    /* Part block */
    const div = document.createElement('div');
    div.className = 'part-block';
    div.id = `part-${part.part}`;
    let html = `<div class="part-head">
      <h2>Listening — Part ${part.part}</h2>
      <span class="part-tag">PART ${part.part}</span>
    </div>
    <div class="instructions">${part.instructions}</div>
    <div class="section-title">${part.title}</div>`;
    part.sections.forEach((sec, si) => {
      if (si > 0) html += `<hr class="section-divider">`;
      html += renderSection(sec);
    });
    div.innerHTML = html;
    container.appendChild(div);

    /* Tab button */
    const btn = document.createElement('button');
    btn.className = 'part-tab';
    btn.id = `tab-${part.part}`;
    btn.textContent = `Part ${part.part}`;
    btn.onclick = () => switchPart(part.part);
    tabsEl.appendChild(btn);
  });
}

/* ─── Collect ALL question IDs from EXAM ─── */
function collectAllQids() {
  const ids = [];
  EXAM.forEach(part => {
    part.sections.forEach(sec => {
      if (sec.type === 'form') {
        sec.items.forEach(it => { if (it.type === 'q') ids.push(it.id); });
      } else if (sec.type === 'table') {
        sec.rows.forEach(row => row.cells.forEach(c => { if (c && c.type === 'q') ids.push(c.id); }));
      } else if (sec.type === 'flowchart') {
        sec.steps.forEach(st => {
          if (st.type === 'q-step') ids.push(st.id);
          if (st.type === 'sub') st.items.forEach(s => { if (s.type === 'q-sub') ids.push(s.id); });
        });
      } else if (sec.type === 'multiple-choice') {
        sec.items.forEach(q => ids.push(q.id));
      } else if (sec.type === 'multi-select') {
        sec.ids.forEach(id => ids.push(id));
      } else if (sec.type === 'pick-from-list') {
        sec.ids.forEach(id => ids.push(id));
      } else if (sec.type === 'matching') {
        sec.items.forEach(it => { if (!it.noAnswer) ids.push(it.id); });
      } else if (sec.type === 'classification') {
        sec.items.forEach(it => ids.push(it.id));
      } else if (sec.type === 'diagram') {
        sec.items.forEach(it => ids.push(it.id));
      } else if (sec.type === 'short-answer') {
        sec.items.forEach(it => ids.push(it.id));
      }
    });
  });
  return ids;
}

function buildDock() {
  const dock = document.getElementById('q-dock');
  dock.innerHTML = '';
  const ids = collectAllQids();
  ids.forEach(id => {
    const b = document.createElement('button');
    b.className = 'q-btn';
    b.id = `qb-${id}`;
    b.textContent = id;
    b.onclick = () => jumpToQ(id);
    dock.appendChild(b);
  });
}

function switchPart(p) {
  currentPart = p;
  document.querySelectorAll('.part-block').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.part-tab').forEach(el => el.classList.remove('active'));
  const pb = document.getElementById(`part-${p}`);
  const tb = document.getElementById(`tab-${p}`);
  if (pb) pb.classList.add('active');
  if (tb) tb.classList.add('active');
  updateDockHighlight();
}

function partForQ(id) {
  for (const part of EXAM) {
    const ids = [];
    part.sections.forEach(sec => gatherIds(sec, ids));
    if (ids.includes(id) || ids.includes(String(id))) return part.part;
  }
  return 1;
}

function gatherIds(sec, arr) {
  if (sec.type === 'form') sec.items.forEach(it => { if (it.type === 'q') arr.push(it.id); });
  else if (sec.type === 'table') sec.rows.forEach(r => r.cells.forEach(c => { if (c && c.type === 'q') arr.push(c.id); }));
  else if (sec.type === 'flowchart') sec.steps.forEach(st => { if (st.type === 'q-step') arr.push(st.id); if (st.type === 'sub') st.items.forEach(s => { if (s.type === 'q-sub') arr.push(s.id); }); });
  else if (sec.type === 'multiple-choice') sec.items.forEach(q => arr.push(q.id));
  else if (sec.type === 'multi-select') sec.ids.forEach(id => arr.push(id));
  else if (sec.type === 'pick-from-list') sec.ids.forEach(id => arr.push(id));
  else if (sec.type === 'matching') sec.items.forEach(it => { if (!it.noAnswer) arr.push(it.id); });
  else if (sec.type === 'classification') sec.items.forEach(it => arr.push(it.id));
  else if (sec.type === 'diagram') sec.items.forEach(it => arr.push(it.id));
  else if (sec.type === 'short-answer') sec.items.forEach(it => arr.push(it.id));
}

function jumpToQ(id) {
  const p = partForQ(id);
  if (currentPart !== p) switchPart(p);
  setTimeout(() => {
    const el = document.querySelector(`[data-q="${id}"]`);
    if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); el.focus && el.focus(); }
  }, 80);
}

function updateDockHighlight() {
  const ids = collectAllQids();
  ids.forEach(id => {
    const btn = document.getElementById(`qb-${id}`);
    if (!btn) return;
    const p = partForQ(id);
    btn.classList.toggle('current', p === currentPart);
  });
}

/* ─── Answer tracking ─── */
function setupTracking() {
  document.addEventListener('input', onInputChange);
  document.addEventListener('change', onInputChange);
}

function onInputChange(e) {
  const el = e.target;
  const qid = el.getAttribute('data-q');
  if (!qid) return;
  let answered = false;
  if (el.type === 'text') answered = el.value.trim() !== '';
  else if (el.type === 'radio') answered = el.checked;
  else if (el.tagName === 'SELECT') answered = el.value !== '';
  else if (el.type === 'checkbox') {
    /* handled per-group below */
    const grp = el.getAttribute('data-ms-group') || el.getAttribute('data-pfl-ids');
    if (grp) { updateMultiAnswerDock(el); return; }
  }
  const btn = document.getElementById(`qb-${qid}`);
  if (btn) btn.classList.toggle('answered', answered);
}

function updateMultiAnswerDock(changedEl) {
  const grp = changedEl.getAttribute('data-ms-group');
  const pflIds = changedEl.getAttribute('data-pfl-ids');
  const key = grp || pflIds;
  const checked = [...document.querySelectorAll(`[data-ms-group="${key}"]:checked,[data-pfl-ids="${key}"]:checked`)];
  // Mark all related IDs based on whether something is checked
  if (grp) {
    // multi-select: ids not individually tracked, mark the group button if exists
    checked.length > 0 ? null : null; // dock uses first id of the group
  }
  if (pflIds) {
    const ids = pflIds.split(',');
    ids.forEach((id, i) => {
      const btn = document.getElementById(`qb-${id}`);
      if (btn) btn.classList.toggle('answered', checked.length > i);
    });
  }
}

/* ─── Timer ─── */
let secondsLeft = 30 * 60;
let timerRef = null;
function startTimer() {
  const el = document.getElementById('timer');
  timerRef = setInterval(() => {
    const m = String(Math.floor(secondsLeft / 60)).padStart(2, '0');
    const s = String(secondsLeft % 60).padStart(2, '0');
    el.textContent = `${m}:${s}`;
    if (secondsLeft <= 0) { clearInterval(timerRef); submitTest(); }
    secondsLeft--;
  }, 1000);
}

/* ─── Submit ─── */
function getUserAnswer(id) {
  const text = document.querySelector(`input[type="text"][data-q="${id}"]`);
  if (text) return text.value.trim().toLowerCase();
  const radio = document.querySelector(`input[type="radio"][data-q="${id}"]:checked`);
  if (radio) return radio.value.trim().toLowerCase();
  const sel = document.querySelector(`select[data-q="${id}"]`);
  if (sel) return sel.value.trim().toLowerCase();
  return '';
}

function submitTest() {
  clearInterval(timerRef);
  const ids = collectAllQids();
  let score = 0;
  let log = '';

  ids.forEach(id => {
    const correct = ANSWER_KEY[id];
    if (correct === undefined) return; // no answer required (noAnswer items)
    
    let userAns = '';
    // multi-select / pick-from-list — answer is array
    if (Array.isArray(correct)) {
      const grpKey = Object.keys(ANSWER_KEY).find(k => k === String(id) || k.startsWith(id + '-'));
      const msGroup = document.querySelectorAll(`[data-ms-group]:checked`);
      const pflGroup = document.querySelectorAll(`[data-pfl-ids]:checked`);
      const allChecked = [...msGroup, ...pflGroup].map(el => el.value.toUpperCase()).sort();
      const correctSorted = [...correct].map(c => c.toUpperCase()).sort();
      const isCorrect = JSON.stringify(allChecked) === JSON.stringify(correctSorted);
      if (isCorrect) score++;
      log += reportRow(id, isCorrect, allChecked.join(', ') || '[Blank]', correct.join(', '));
      return;
    }

    userAns = getUserAnswer(id);
    const isCorrect = userAns === String(correct).toLowerCase();
    if (isCorrect) score++;
    log += reportRow(id, isCorrect, userAns || '[Blank]', correct);
  });

  const total = ids.length;
  const band = calcBand(score, total);

  document.getElementById('modal-body').innerHTML = `
    <p style="margin-bottom:8px">Questions answered correctly: <strong>${score} / ${total}</strong></p>
    <div class="band-badge">Estimated Band Score: ${band}</div>
    <h4 style="margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:5px;font-family:var(--mono)">Review Log</h4>
    ${log}
  `;
  document.getElementById('modal').classList.add('active');
}

function reportRow(id, correct, userAns, correctAns) {
  return `<div class="report-row">
    <span class="qn">${id}</span>
    <span class="${correct ? 'ok' : 'no'}">${correct ? '✓ Correct' : '✗ Incorrect'}</span>
    <span>Your answer: "<strong>${userAns}</strong>"</span>
    ${!correct ? `<span style="color:var(--muted)">| Correct: "<strong>${correctAns}</strong>"</span>` : ''}
  </div>`;
}

function calcBand(score, total) {
  const pct = score / total;
  if (pct >= 0.975) return 9.0;
  if (pct >= 0.925) return 8.5;
  if (pct >= 0.875) return 8.0;
  if (pct >= 0.800) return 7.5;
  if (pct >= 0.750) return 7.0;
  if (pct >= 0.650) return 6.5;
  if (pct >= 0.575) return 6.0;
  if (pct >= 0.450) return 5.5;
  if (pct >= 0.350) return 5.0;
  return 4.0;
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
}

/* ─── Init ─── */
document.addEventListener('DOMContentLoaded', () => {
  buildAllParts();
  buildDock();
  setupTracking();
  switchPart(1);
  startTimer();
});
</script>
</body>
</html>
