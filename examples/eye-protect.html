<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Static Noise Effect</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: --apple-system, sans-serif;
            background: white
            color: black;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 2;
        }
        /* Eye Protection Filters */
        #eye-protection-filter {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 3; /* Above noise, below content */
            mix-blend-mode: multiply;
        }
        .eye-protection-yellow {
            background: rgba(255, 242, 204, 0.11) /* Light yellow tint */
        }

        /* Static Noise Effect */
        #static-noise {
            content: "";
            background-image: url(https://static.showit.co/file/4M9A2VD7-bMkRDd8YCc5Cw/93738/static-noise.png);
            height: 300%;
            width: 300%;
            position: fixed;
            top: -100%;
            left: -100%;
            opacity: 0.03;
            pointer-events: none;
            animation: noise-animation 4s steps(10) infinite;
            z-index: 1;
            background-blend-mode: difference;
        }

        @keyframes noise-animation {
            0% {
                transform: translate(0, 0);
            }
            10% {
                transform: translate(-5%, -5%);
            }
            20% {
                transform: translate(-10%, 5%);
            }
            30% {
                transform: translate(5%, -10%);
            }
            40% {
                transform: translate(-5%, 15%);
            }
            50% {
                transform: translate(-10%, 5%);
            }
            60% {
                transform: translate(15%, 0);
            }
            70% {
                transform: translate(0, 10%);
            }
            80% {
                transform: translate(-15%, 0);
            }
            90% {
                transform: translate(10%, 5%);
            }
            100% {
                transform: translate(5%, 0);
            }
        }
    </style>
</head>
<body>
    <div id="eye-protection-filter" class="eye-protection-yellow"></div>
    <!-- Static Noise Layer -->
    <div id="static-noise"></div>

    <div class="container">
        Hello my name is Qudratillo here you can find a lot of works
    </div>
</body>
</html>
