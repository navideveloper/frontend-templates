<html>
  <head>
    <script
      type="text/javascript"
      src="./googlemap.js"
    ></script>
  </head>

  <body>
    <div id="regions_div_global" class="geo-chart"></div>
    <div id="regions_div_japan" class="geo-chart"></div>
  </body>

  <style>
    div.geo-chart {
      width: calc(100vw-16px);
      height: 100vh;
    }
  </style>

  <script type="text/javascript">
    google.charts.load('current', {
      packages: ['geochart'],
    });
    google.charts.setOnLoadCallback(drawRegionsMap);

    function drawRegionsMap() {
      var data = google.visualization.arrayToDataTable([
        ['Country', 'Popularity'],
        ['Germany', 200],
        ['United States', 300],
        ['Brazil', 400],
        ['Canada', 500],
        ['France', 600],
        ['RU', 700],
        ['Uz',800]
      ]);

      var options = {};

      var chart = new google.visualization.GeoChart(
        document.getElementById('regions_div_global')
      );

      chart.draw(data, options);
    }
  </script>

  <script type="text/javascript">
    google.charts.load('current', {
      packages: ['geochart'],
    });
    google.charts.setOnLoadCallback(drawRegionsMap);

    function drawRegionsMap() {
      var data = google.visualization.arrayToDataTable([
        // ['都道府県', '坪単価平均'],
        ['provinces', 'price'],
        ['Osaka', 1215186],
        ['Kyoto', 729900],
        // ['兵庫', 491799], // cant use jp
        ['Nara', 237718],
        // ['奈良', 237718],
        // ['滋賀', 160000],
        // ['和歌山', 151311],
        ['Tokyo', 729900],
      ]);

      var options = {
        title: '関西地方の都道府県の基準地価 - 2020年',
        // width: 600,
        // height: 400,
        region: 'JP',
        resolution: 'provinces',
      };

      var chart = new google.visualization.GeoChart(
        document.getElementById('regions_div_japan')
      );

      chart.draw(data, options);
    }
  </script>
</html>
