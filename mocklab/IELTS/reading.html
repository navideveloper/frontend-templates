<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IELTS Computer-Delivered Reading Practice Test</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400;1,600&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink:       #141820;
  --page:      #faf8f4;
  --cream:     #f2efe8;
  --rule:      #d8d2c4;
  --blue:      #1a4fa0;
  --blue-pale: #eef2fb;
  --gold:      #c9952a;
  --gold-pale: #fdf6e3;
  --green:     #0e6630;
  --red:       #b5190f;
  --muted:     #6b6455;
  --white:     #ffffff;
  --serif:     'Crimson Pro', Georgia, serif;
  --mono:      'JetBrains Mono', 'Courier New', monospace;
  --panel-w:   48%;
  --header-h:  52px;
  --footer-h:  52px;

  /* Highlight colors */
  --hl-yellow: #fff176;
  --hl-green:  #b9f6ca;
  --hl-blue:   #bbdefb;
  --hl-pink:   #f8bbd0;
  --hl-orange: #ffe0b2;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

body {
  font-family: var(--serif);
  background: var(--ink);
  color: var(--ink);
  display: flex;
  flex-direction: column;
  font-size: 16px;
}

/* ══ HEADER ══ */
header {
  height: var(--header-h);
  background: var(--ink);
  border-bottom: 2.5px solid var(--gold);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 22px;
  flex-shrink: 0;
  gap: 16px;
  z-index: 100;
}
.logo {
  font-family: var(--mono);
  font-weight: 700;
  font-size: 0.95rem;
  color: var(--white);
  letter-spacing: 0.08em;
  white-space: nowrap;
}
.logo em { color: var(--gold); font-style: normal; }

.passage-tabs { display: flex; gap: 3px; }
.passage-tab {
  font-family: var(--mono);
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  background: #2a2f3e;
  color: #8a90a8;
  border: none;
  padding: 6px 16px;
  cursor: pointer;
  border-radius: 3px;
  transition: all 0.15s;
  white-space: nowrap;
}
.passage-tab:hover { background: #363c52; color: var(--white); }
.passage-tab.active { background: var(--gold); color: var(--ink); }

.timer {
  font-family: var(--mono);
  font-weight: 700;
  font-size: 1.1rem;
  background: var(--gold);
  color: var(--ink);
  padding: 5px 14px;
  border-radius: 3px;
  letter-spacing: 0.07em;
  white-space: nowrap;
}
.timer.warn { background: #e05a2b; color: var(--white); }

/* ══ TOOLBAR ══ */
.toolbar {
  height: 40px;
  background: #1e2433;
  border-bottom: 1px solid #2e3548;
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 6px;
  flex-shrink: 0;
  z-index: 90;
}
.toolbar-label {
  font-family: var(--mono);
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: #6a7090;
  text-transform: uppercase;
  margin-right: 4px;
}
.hl-btn {
  width: 22px;
  height: 22px;
  border-radius: 3px;
  border: 2px solid transparent;
  cursor: pointer;
  transition: all 0.12s;
  flex-shrink: 0;
  position: relative;
}
.hl-btn:hover { transform: scale(1.18); border-color: rgba(255,255,255,0.4); }
.hl-btn.active { border-color: var(--white) !important; transform: scale(1.15); }
.hl-btn[data-color="yellow"] { background: var(--hl-yellow); }
.hl-btn[data-color="green"]  { background: var(--hl-green); }
.hl-btn[data-color="blue"]   { background: var(--hl-blue); }
.hl-btn[data-color="pink"]   { background: var(--hl-pink); }
.hl-btn[data-color="orange"] { background: var(--hl-orange); }

.tool-sep {
  width: 1px;
  height: 22px;
  background: #3a4060;
  margin: 0 6px;
}

.tb-btn {
  font-family: var(--mono);
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  background: #2a2f3e;
  color: #9aa0c0;
  border: 1px solid #3a4060;
  padding: 4px 10px;
  border-radius: 3px;
  cursor: pointer;
  transition: all 0.12s;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 5px;
}
.tb-btn:hover { background: #363c52; color: var(--white); }
.tb-btn.active { background: var(--gold); color: var(--ink); border-color: var(--gold); }
.tb-btn svg { width: 13px; height: 13px; fill: currentColor; }

.notes-count {
  font-family: var(--mono);
  font-size: 0.65rem;
  background: var(--gold);
  color: var(--ink);
  border-radius: 10px;
  padding: 1px 5px;
  font-weight: 700;
  min-width: 18px;
  text-align: center;
  display: none;
}
.notes-count.visible { display: inline-block; }

/* ══ MAIN SPLIT PANE ══ */
main {
  flex: 1;
  display: flex;
  overflow: hidden;
  background: var(--ink);
  gap: 3px;
}

/* ── Passage Panel ── */
.passage-panel {
  width: var(--panel-w);
  flex-shrink: 0;
  background: var(--page);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border-right: 3px solid var(--gold);
  position: relative;
}
.passage-panel-inner {
  flex: 1;
  overflow-y: auto;
  padding: 28px 32px 36px;
  user-select: text;
}
.passage-header { margin-bottom: 18px; }
.passage-label {
  font-family: var(--mono);
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  color: var(--muted);
  margin-bottom: 6px;
  text-transform: uppercase;
}
.passage-title {
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.25;
  margin-bottom: 6px;
}
.passage-subtitle {
  font-size: 1rem;
  font-style: italic;
  color: var(--muted);
  line-height: 1.4;
}
.passage-divider { border: none; border-top: 1.5px solid var(--rule); margin: 16px 0; }
.passage-body {
  font-size: 0.97rem;
  line-height: 1.82;
  color: var(--ink);
}
.passage-body p { margin-bottom: 1.1em; text-align: justify; hyphens: auto; }
.para-label {
  display: inline-block;
  font-family: var(--mono);
  font-weight: 700;
  font-size: 0.72rem;
  background: var(--ink);
  color: var(--white);
  padding: 1px 6px;
  border-radius: 2px;
  margin-right: 6px;
  vertical-align: middle;
  letter-spacing: 0.06em;
}
.passage-body mark { background: #fff3c4; border-radius: 2px; padding: 0 2px; }

/* Highlights */
.hl {
  border-radius: 2px;
  padding: 0 1px;
  cursor: pointer;
  position: relative;
  transition: opacity 0.15s;
}
.hl:hover { opacity: 0.8; }
.hl[data-color="yellow"] { background: var(--hl-yellow); }
.hl[data-color="green"]  { background: var(--hl-green); }
.hl[data-color="blue"]   { background: var(--hl-blue); }
.hl[data-color="pink"]   { background: var(--hl-pink); }
.hl[data-color="orange"] { background: var(--hl-orange); }
.hl.has-note { border-bottom: 2px dotted #555; }

/* ── Questions Panel ── */
.questions-panel {
  flex: 1;
  background: var(--cream);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.questions-panel-inner {
  flex: 1;
  overflow-y: auto;
  padding: 24px 28px 36px;
}
.q-section { margin-bottom: 32px; }
.q-instructions {
  background: var(--blue-pale);
  border-left: 4px solid var(--blue);
  padding: 10px 14px;
  font-size: 0.88rem;
  line-height: 1.55;
  margin-bottom: 16px;
  border-radius: 0 4px 4px 0;
  font-family: var(--serif);
  font-style: italic;
}
.q-section-title {
  font-family: var(--mono);
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 0.07em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 14px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--rule);
}
.section-divider { border: none; border-top: 2px dashed var(--rule); margin: 28px 0 22px; }

.qn {
  display: inline-flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 0.68rem; font-weight: 700;
  min-width: 24px; height: 20px; padding: 0 5px;
  background: var(--ink); color: var(--white); border-radius: 3px;
  flex-shrink: 0; letter-spacing: 0.02em;
}

.input-wrap {
  display: inline-flex; align-items: center; gap: 5px;
  border: 1.5px solid var(--rule); background: var(--white);
  border-radius: 4px; padding: 2px 6px; transition: border-color 0.15s;
}
.input-wrap:focus-within { border-color: var(--blue); }
input[type="text"] {
  border: none; outline: none; font-family: var(--serif);
  font-size: 0.95rem; width: 160px; padding: 4px 2px;
  color: var(--blue); font-weight: 600; background: transparent;
}

.mc-item { margin-bottom: 20px; }
.mc-q { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 9px; font-size: 0.95rem; line-height: 1.55; font-weight: 600; }
.options-list { margin-left: 32px; display: flex; flex-direction: column; gap: 7px; }
.opt-label { display: flex; align-items: flex-start; gap: 8px; cursor: pointer; font-size: 0.93rem; line-height: 1.5; }
.opt-label input[type="radio"], .opt-label input[type="checkbox"] { margin-top: 3px; accent-color: var(--blue); cursor: pointer; flex-shrink: 0; width: 15px; height: 15px; }

.tfng-item { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 14px; font-size: 0.93rem; line-height: 1.55; }
.tfng-statement { flex: 1; }
.tfng-radios { display: flex; gap: 4px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
.tfng-btn {
  font-family: var(--mono); font-size: 0.7rem; font-weight: 700; letter-spacing: 0.04em;
  padding: 4px 9px; border: 1.5px solid var(--rule); border-radius: 3px; cursor: pointer;
  background: var(--white); color: var(--muted); transition: all 0.12s; white-space: nowrap; user-select: none;
}
.tfng-btn:hover { border-color: var(--blue); color: var(--blue); }
.tfng-btn.sel-T   { background: var(--green);  border-color: var(--green);  color: var(--white); }
.tfng-btn.sel-F   { background: var(--red);    border-color: var(--red);    color: var(--white); }
.tfng-btn.sel-NG  { background: #7a6e5f;       border-color: #7a6e5f;       color: var(--white); }
.tfng-btn.sel-Y   { background: var(--green);  border-color: var(--green);  color: var(--white); }
.tfng-btn.sel-N   { background: var(--red);    border-color: var(--red);    color: var(--white); }

.match-pool { background: var(--white); border: 1.5px solid var(--rule); border-radius: 6px; padding: 12px 14px; margin-bottom: 16px; font-size: 0.88rem; line-height: 1.7; }
.match-pool-title { font-family: var(--mono); font-size: 0.68rem; font-weight: 700; letter-spacing: 0.08em; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
.match-pool-item { margin: 3px 0; }
.match-row { display: flex; align-items: center; gap: 10px; margin-bottom: 11px; font-size: 0.93rem; line-height: 1.5; }
.match-label { flex: 1; }
select.drop { border: 1.5px solid var(--rule); border-radius: 4px; padding: 5px 10px; font-family: var(--serif); font-size: 0.88rem; color: var(--blue); font-weight: 600; background: var(--white); outline: none; min-width: 110px; cursor: pointer; transition: border-color 0.15s; }
select.drop:focus { border-color: var(--blue); }

.sent-ending-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 12px; font-size: 0.93rem; line-height: 1.55; }
.sent-stem { flex: 1; font-style: italic; }

.summary-block { background: var(--white); border: 1.5px solid var(--rule); border-radius: 6px; padding: 16px 18px; font-size: 0.95rem; line-height: 2.1; margin-bottom: 8px; }
.summary-block p { margin-bottom: 0.5em; }

.short-a-item { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 14px; font-size: 0.93rem; line-height: 1.55; }
.short-a-q { flex: 1; }

.pick-list { display: flex; flex-direction: column; gap: 7px; margin: 6px 0 6px 4px; }

.class-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; margin: 8px 0; }
.class-table th { background: var(--ink); color: var(--white); font-family: var(--mono); font-size: 0.72rem; font-weight: 700; letter-spacing: 0.05em; padding: 8px 10px; text-align: left; }
.class-table td { border: 1.5px solid var(--rule); padding: 8px 10px; vertical-align: middle; }
.class-table tr:nth-child(even) td { background: #f7f5f0; }

/* ══ NOTES PANEL ══ */
.notes-panel {
  width: 0;
  flex-shrink: 0;
  background: #1a1f2e;
  border-left: 3px solid #2e3548;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: width 0.25s ease;
}
.notes-panel.open { width: 280px; }
.notes-panel-head {
  padding: 14px 16px 10px;
  border-bottom: 1px solid #2e3548;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.notes-panel-title {
  font-family: var(--mono);
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--gold);
  text-transform: uppercase;
}
.notes-close {
  background: none;
  border: none;
  color: #6a7090;
  cursor: pointer;
  font-size: 1.2rem;
  line-height: 1;
  padding: 2px 6px;
  border-radius: 3px;
  transition: color 0.12s;
}
.notes-close:hover { color: var(--white); }

.notes-list {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}
.note-card {
  background: #242b3e;
  border: 1px solid #2e3548;
  border-radius: 6px;
  padding: 10px 12px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: border-color 0.15s;
  position: relative;
}
.note-card:hover { border-color: var(--gold); }
.note-card-passage {
  font-family: var(--mono);
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 4px;
}
.note-card-quote {
  font-size: 0.78rem;
  color: #8a90b0;
  font-style: italic;
  margin-bottom: 6px;
  line-height: 1.4;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.note-card-text {
  font-size: 0.82rem;
  color: #c8ceee;
  line-height: 1.45;
  white-space: pre-wrap;
  word-break: break-word;
}
.note-card-delete {
  position: absolute;
  top: 8px; right: 8px;
  background: none;
  border: none;
  color: #4a5068;
  cursor: pointer;
  font-size: 0.9rem;
  padding: 2px 4px;
  border-radius: 3px;
  transition: color 0.12s;
  line-height: 1;
}
.note-card-delete:hover { color: var(--red); }
.notes-empty {
  padding: 20px 10px;
  text-align: center;
  color: #4a5068;
  font-size: 0.82rem;
  font-style: italic;
  line-height: 1.6;
}

/* ══ CONTEXT MENU ══ */
.ctx-menu {
  position: fixed;
  background: #1e2433;
  border: 1px solid #3a4060;
  border-radius: 6px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  z-index: 8000;
  min-width: 180px;
  padding: 6px 0;
  display: none;
}
.ctx-menu.visible { display: block; }
.ctx-section-label {
  font-family: var(--mono);
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #4a5068;
  padding: 4px 14px 2px;
}
.ctx-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 14px;
  cursor: pointer;
  font-size: 0.85rem;
  color: #c8ceee;
  font-family: var(--serif);
  transition: background 0.1s;
}
.ctx-item:hover { background: #2a3050; }
.ctx-dot {
  width: 14px; height: 14px;
  border-radius: 2px;
  flex-shrink: 0;
}
.ctx-sep { border: none; border-top: 1px solid #2e3548; margin: 4px 0; }

/* ══ NOTE EDITOR MODAL ══ */
.note-modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9500;
  visibility: hidden;
  opacity: 0;
  transition: all 0.18s;
}
.note-modal-overlay.active { visibility: visible; opacity: 1; }
.note-modal {
  background: #1e2433;
  border: 1px solid #3a4060;
  border-radius: 8px;
  width: 420px;
  max-width: 90vw;
  overflow: hidden;
  box-shadow: 0 16px 60px rgba(0,0,0,0.7);
  border-top: 3px solid var(--gold);
}
.note-modal-head {
  padding: 14px 18px;
  border-bottom: 1px solid #2e3548;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.note-modal-title {
  font-family: var(--mono);
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.07em;
  color: var(--gold);
  text-transform: uppercase;
}
.note-modal-quote {
  padding: 10px 18px;
  background: #161b28;
  font-size: 0.85rem;
  font-style: italic;
  color: #7a80a0;
  line-height: 1.5;
  border-bottom: 1px solid #2e3548;
  max-height: 70px;
  overflow: hidden;
  text-overflow: ellipsis;
}
.note-modal-quote::before { content: '"'; color: var(--gold); margin-right: 2px; }
.note-modal-quote::after  { content: '"'; color: var(--gold); margin-left: 2px; }
.note-modal textarea {
  display: block;
  width: 100%;
  padding: 14px 18px;
  background: #1a1f2e;
  border: none;
  outline: none;
  color: #e0e4f8;
  font-family: var(--serif);
  font-size: 0.92rem;
  line-height: 1.6;
  resize: none;
  min-height: 100px;
}
.note-modal-foot {
  padding: 10px 18px;
  border-top: 1px solid #2e3548;
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}
.note-modal-btn {
  font-family: var(--mono);
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  padding: 7px 16px;
  border-radius: 4px;
  cursor: pointer;
  border: none;
  transition: background 0.12s;
}
.note-modal-btn.cancel { background: #2a2f3e; color: #9aa0c0; }
.note-modal-btn.cancel:hover { background: #363c52; }
.note-modal-btn.save { background: var(--gold); color: var(--ink); }
.note-modal-btn.save:hover { background: #b8841f; }

/* ══ FOOTER ══ */
footer {
  height: var(--footer-h);
  background: var(--ink);
  border-top: 2px solid #2a2f3e;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 22px;
  gap: 14px;
  flex-shrink: 0;
  z-index: 100;
}
.q-dock { display: flex; gap: 3px; flex-wrap: nowrap; overflow-x: auto; max-width: 65%; padding: 2px 0; }
.q-btn {
  font-family: var(--mono); font-size: 0.72rem; font-weight: 700;
  background: #2a2f3e; color: #7a80a0; border: none;
  padding: 5px 7px; border-radius: 3px; cursor: pointer;
  min-width: 28px; text-align: center; transition: all 0.12s;
}
.q-btn:hover { background: #363c52; color: var(--white); }
.q-btn.answered { background: var(--blue); color: var(--white); }
.q-btn.current-passage { box-shadow: inset 0 0 0 2px var(--gold); }

.submit-btn {
  font-family: var(--mono); font-weight: 700; font-size: 0.82rem; letter-spacing: 0.05em;
  background: var(--green); color: var(--white); border: none; padding: 9px 20px;
  border-radius: 4px; cursor: pointer; white-space: nowrap; transition: background 0.15s;
}
.submit-btn:hover { background: #0b5226; }

/* ══ RESULTS MODAL ══ */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  display: flex; align-items: center; justify-content: center;
  z-index: 9000; visibility: hidden; opacity: 0; transition: all 0.2s;
}
.modal-overlay.active { visibility: visible; opacity: 1; }
.modal-box {
  background: var(--page); width: 92%; max-width: 640px; max-height: 84vh;
  border-radius: 8px; display: flex; flex-direction: column; overflow: hidden;
  border-top: 4px solid var(--gold); box-shadow: 0 24px 80px rgba(0,0,0,0.5);
}
.modal-head { background: var(--ink); color: var(--white); padding: 16px 22px; font-family: var(--mono); font-size: 0.95rem; font-weight: 700; letter-spacing: 0.06em; }
.modal-body { padding: 22px; overflow-y: auto; flex: 1; font-size: 0.9rem; line-height: 1.7; }

/* ── Serialise/deserialise a Range via text-offset within passage body ── */
function serializeRange(range, passageBodyEl) {
  const allText = getTextContent(passageBodyEl);
  const preStart = getRangeOffset(range.startContainer, range.startOffset, passageBodyEl);
  const preEnd   = getRangeOffset(range.endContainer,   range.endOffset,   passageBodyEl);
  if (preStart < 0 || preEnd < 0) return null;
  return { start: preStart, end: preEnd, text: allText.slice(preStart, preEnd).slice(0, 300) };
}

  // Collect text in tree order
  let t = '';
  const walk = document.createTreeWalker(node, NodeFilter.SHOW_TEXT);
  let n;
  while ((n = walk.nextNode())) t += n.textContent;
  return t;
}

function getRangeOffset(container, offset, root) {
  let chars = 0;
  const walk = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
  let n;
  while ((n = walk.nextNode())) {
    if (n === container) return chars + offset;
    chars += n.textContent.length;
  }
  return -1;
}

function deserializeRange(serial, passageBodyEl) {
  let chars = 0;
  let startNode = null, startOff = 0, endNode = null, endOff = 0;
  const walk = document.createTreeWalker(passageBodyEl, NodeFilter.SHOW_TEXT);
  let n;
  while ((n = walk.nextNode())) {
    const len = n.textContent.length;
    if (!startNode && chars + len > serial.start) {
      startNode = n; startOff = serial.start - chars;
    }
    if (!endNode && chars + len >= serial.end) {
      endNode = n; endOff = serial.end - chars; break;
    }
    chars += len;
  }
  if (!startNode || !endNode) return null;
  try {
    const r = document.createRange();
    r.setStart(startNode, startOff);
    r.setEnd(endNode, endOff);
    return r;
  } catch { return null; }
}

/* ── Wrap a range in highlight spans (handles multi-node ranges) ── */
function wrapRange(range, color, hlId, hasNote) {
  // Extract and re-insert wrapped content
  const frag = range.extractContents();
  const span = document.createElement('span');
  span.className = 'hl' + (hasNote ? ' has-note' : '');
  span.dataset.color  = color;
  span.dataset.hlId   = hlId;
  span.title = 'Right-click for options';
  span.appendChild(frag);
  range.insertNode(span);
  attachHLListeners(span);
  return span;
}

function attachHLListeners(span) {
  span.addEventListener('contextmenu', onHLContextMenu);
  span.addEventListener('click', onHLClick);
}

/* ── Apply stored highlight to DOM ── */
function applyHighlightToDOM(hlData) {
  // Make sure passage is in DOM (may be hidden but exists)
  const bodyEl = document.querySelector(`#passage-view-${hlData.passageId} .passage-body`);
  if (!bodyEl) return;
  const range = deserializeRange(hlData.serial, bodyEl);
  if (!range || range.collapsed) return;
  try { wrapRange(range, hlData.color, hlData.id, hlData.hasNote); } catch {}
}

/* ── Main: highlight current selection ── */
function doHighlight(color, savedRange) {
  let range = savedRange;
  if (!range) {
    const sel = window.getSelection();
    if (!sel || sel.isCollapsed || sel.rangeCount === 0) return;
    range = sel.getRangeAt(0).cloneRange();
    sel.removeAllRanges();
  }

  if (!range || range.collapsed) return;
  const text = range.toString().trim();
  if (!text) return;

  // Must be inside a passage body
  const bodyEl = range.commonAncestorContainer.nodeType === Node.ELEMENT_NODE
    ? range.commonAncestorContainer.closest('.passage-body')
    : range.commonAncestorContainer.parentElement?.closest('.passage-body');
  if (!bodyEl) return;

  const view = bodyEl.closest('[id^="passage-view-"]');
  if (!view) return;
  const passageId = parseInt(view.id.replace('passage-view-', ''));

  const serial = serializeRange(range, bodyEl);
  if (!serial) return;

  const hlId = genId();
  const hlData = { id: hlId, passageId, color, serial, hasNote: false };

  try {
    wrapRange(range, color, hlId, false);
  } catch (e) {
    console.warn('wrapRange failed:', e);
    return;
  }

  const hls = loadHighlights();
  hls.push(hlData);
  saveHighlights(hls);
}

/* ── Remove highlight ── */
function removeHighlightById(hlId) {
  const span = document.querySelector(`.hl[data-hl-id="${hlId}"]`);
  if (span) {
    const parent = span.parentNode;
    while (span.firstChild) parent.insertBefore(span.firstChild, span);
    parent.removeChild(span);
    parent.normalize();
  }
  saveHighlights(loadHighlights().filter(h => h.id !== hlId));
  saveNotes(loadNotes().filter(n => n.hlId !== hlId));
  updateNotesPanel();
}

/* ── HL event handlers ── */
function onHLClick(e) {
  if (!eraseMode) return;
  e.preventDefault();
  removeHighlightById(e.currentTarget.dataset.hlId);
}

function onHLContextMenu(e) {
  e.preventDefault();
  e.stopPropagation();
  ctxTargetHL = e.currentTarget;
  pendingRange = null;
  document.getElementById('ctx-remove').style.display = 'flex';
  showCtxMenu(e.clientX, e.clientY);
}

/* ── Restore all highlights ── */
function restoreHighlights() {
  const notesByHlId = {};
  loadNotes().forEach(n => { notesByHlId[n.hlId] = true; });
  loadHighlights().forEach(hl => {
    hl.hasNote = !!notesByHlId[hl.id];
    applyHighlightToDOM(hl);
  });
}

/* ── Toolbar ── */
function setHLColor(color, btn) {
  hlColor = color;
  eraseMode = false;
  document.querySelectorAll('.hl-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('erase-btn').classList.remove('active');
}

function toggleErase() {
  eraseMode = !eraseMode;
  document.getElementById('erase-btn').classList.toggle('active', eraseMode);
  if (eraseMode) {
    document.querySelectorAll('.hl-btn').forEach(b => b.classList.remove('active'));
  } else {
    const activeBtn = document.querySelector(`.hl-btn[data-color="${hlColor}"]`);
    if (activeBtn) activeBtn.classList.add('active');
  }
}

function clearAllAnnotations() {
  if (!confirm('Barcha highlight va noteslarni o\'chirmoqchimisiz?')) return;
  localStorage.removeItem(LS_HL);
  localStorage.removeItem(LS_NOTES);
  document.querySelectorAll('.hl').forEach(span => {
    const parent = span.parentNode;
    while (span.firstChild) parent.insertBefore(span.firstChild, span);
    parent.removeChild(span);
    parent.normalize();
  });
  updateNotesPanel();
}

/* ── Context Menu ── */
function showCtxMenu(x, y) {
  const menu = document.getElementById('ctx-menu');
  menu.classList.add('visible');
  const vw = window.innerWidth, vh = window.innerHeight;
  const mw = 200, mh = 270;
  menu.style.left = Math.min(x, vw - mw - 8) + 'px';
  menu.style.top  = Math.min(y, vh - mh - 8) + 'px';
}

function hideCtxMenu() {
  document.getElementById('ctx-menu').classList.remove('visible');
  document.getElementById('ctx-remove').style.display = 'none';
  ctxTargetHL = null;
}

function ctxHighlight(color) {
  hideCtxMenu();
  doHighlight(color, pendingRange);
  pendingRange = null;
}

function ctxRemoveHighlight() {
  hideCtxMenu();
  if (ctxTargetHL) { removeHighlightById(ctxTargetHL.dataset.hlId); ctxTargetHL = null; }
}

function ctxAddNote() {
  hideCtxMenu();
  openNoteModal();
}

/* ── Mouse events on passage ── */
document.addEventListener('mouseup', e => {
  if (e.button !== 0) return;
  // Don't trigger if inside context menu or modal
  if (e.target.closest('#ctx-menu') || e.target.closest('.note-modal-overlay')) return;

  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.toString().trim()) return;

  const range = sel.getRangeAt(0);
  const inBody = (range.commonAncestorContainer.nodeType === Node.ELEMENT_NODE
    ? range.commonAncestorContainer
    : range.commonAncestorContainer.parentElement)?.closest('.passage-body');
  if (!inBody) return;

  if (!eraseMode) {
    doHighlight(hlColor, range.cloneRange());
    sel.removeAllRanges();
  }
});

document.addEventListener('contextmenu', e => {
  const inBody = e.target.closest ? e.target.closest('.passage-body') : null;
  if (!inBody) return;
  if (e.target.closest('.hl')) return; // handled by span listener

  e.preventDefault();
  const sel = window.getSelection();
  if (sel && !sel.isCollapsed && sel.toString().trim()) {
    pendingRange = sel.getRangeAt(0).cloneRange();
    sel.removeAllRanges();
  } else {
    pendingRange = null;
  }
  document.getElementById('ctx-remove').style.display = 'none';
  showCtxMenu(e.clientX, e.clientY);
});

document.addEventListener('mousedown', e => {
  if (!e.target.closest('#ctx-menu')) hideCtxMenu();
});

/* ══════════════════════════════════════════════════════
   NOTES SYSTEM
══════════════════════════════════════════════════════ */
let pendingNoteHlId = null;
let pendingNoteQuote = '';

function openNoteModal(hlId, quote) {
  if (hlId) {
    pendingNoteHlId = hlId;
    pendingNoteQuote = quote || '';
  } else {
    const hls = loadHighlights();
    if (hls.length === 0) {
      alert('Avval matnni belgilab oling, so\'ng note qo\'shing.');
      return;
    }
    const last = hls[hls.length - 1];
    pendingNoteHlId = last.id;
    pendingNoteQuote = (last.serial && last.serial.text) ? last.serial.text : '';
  }

  document.getElementById('note-modal-quote').textContent = pendingNoteQuote.slice(0, 120);
  document.getElementById('note-textarea').value = '';

  // Pre-fill if note already exists
  const notes = loadNotes();
  const existing = notes.find(n => n.hlId === pendingNoteHlId);
  if (existing) document.getElementById('note-textarea').value = existing.text;

  document.getElementById('note-modal-overlay').classList.add('active');
  setTimeout(() => document.getElementById('note-textarea').focus(), 100);
}

function closeNoteModal() {
  document.getElementById('note-modal-overlay').classList.remove('active');
  pendingNoteHlId = null;
}

function saveNote() {
  const text = document.getElementById('note-textarea').value.trim();
  if (!text || !pendingNoteHlId) { closeNoteModal(); return; }

  const notes = loadNotes().filter(n => n.hlId !== pendingNoteHlId);
  const hls = loadHighlights();
  const hl = hls.find(h => h.id === pendingNoteHlId);

  notes.push({
    id: genId(),
    hlId: pendingNoteHlId,
    passageId: hl ? hl.passageId : currentPassage,
    quote: pendingNoteQuote,
    text
  });
  saveNotes(notes);

  // Mark highlight as has-note
  if (hl) {
    hl.hasNote = true;
    saveHighlights(hls);
    const span = document.querySelector(`.hl[data-hl-id="${pendingNoteHlId}"]`);
    if (span) span.classList.add('has-note');
  }

  updateNotesPanel();
  closeNoteModal();

  // Open notes panel if closed
  document.getElementById('notes-panel').classList.add('open');
  document.getElementById('notes-toggle-btn').classList.add('active');
}

function updateNotesPanel() {
  const notes = loadNotes();
  const count = notes.length;
  const countEl = document.getElementById('notes-count');
  countEl.textContent = count;
  countEl.classList.toggle('visible', count > 0);

  const list = document.getElementById('notes-list');
  if (count === 0) {
    list.innerHTML = '<div class="notes-empty">Select text in the passage and right-click to add a note.</div>';
    return;
  }

  list.innerHTML = notes.map(n => `
    <div class="note-card" onclick="jumpToHighlight('${n.hlId}')">
      <div class="note-card-passage">Passage ${n.passageId}</div>
      <div class="note-card-quote">${escHtml(n.quote)}</div>
      <div class="note-card-text">${escHtml(n.text)}</div>
      <button class="note-card-delete" onclick="deleteNote(event,'${n.id}','${n.hlId}')">✕</button>
    </div>
  `).join('');
}

function deleteNote(e, noteId, hlId) {
  e.stopPropagation();
  const notes = loadNotes().filter(n => n.id !== noteId);
  saveNotes(notes);
  // Update hl hasNote
  const hls = loadHighlights();
  const hl = hls.find(h => h.id === hlId);
  if (hl) { hl.hasNote = false; saveHighlights(hls); }
  const span = document.querySelector(`.hl[data-hl-id="${hlId}"]`);
  if (span) span.classList.remove('has-note');
  updateNotesPanel();
}

function jumpToHighlight(hlId) {
  const span = document.querySelector(`.hl[data-hl-id="${hlId}"]`);
  if (span) {
    const view = span.closest('[id^="passage-view-"]');
    if (view) {
      const pid = parseInt(view.id.replace('passage-view-', ''));
      if (pid !== currentPassage) switchPassage(pid);
    }
    setTimeout(() => span.scrollIntoView({ behavior: 'smooth', block: 'center' }), 80);
  }
}

function toggleNotesPanel() {
  const panel = document.getElementById('notes-panel');
  const btn = document.getElementById('notes-toggle-btn');
  panel.classList.toggle('open');
  btn.classList.toggle('active', panel.classList.contains('open'));
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ══════════════════════════════════════════════════════
   RENDERING ENGINE
══════════════════════════════════════════════════════ */
let currentPassage = 1;

function buildInputWrap(id, width) {
  const w = width || 150;
  return `<span class="input-wrap"><span class="qn">${id}</span><input type="text" data-q="${id}" autocomplete="off" style="width:${w}px"></span>`;
}

function renderPassageBody(body) {
  return body.map(p => {
    const label = p.para ? `<span class="para-label">${p.para}</span>` : '';
    return `<p>${label}${p.text}</p>`;
  }).join('');
}

function renderTFNG(sec) {
  const labels = sec.type === 'ynng'
    ? [['Y','YES'],['N','NO'],['NG','NOT GIVEN']]
    : [['T','TRUE'],['F','FALSE'],['NG','NOT GIVEN']];
  return sec.items.map(item => `
    <div class="tfng-item">
      <span class="qn">${item.id}</span>
      <span class="tfng-statement">${item.statement}</span>
      <div class="tfng-radios">
        ${labels.map(([code,label]) => `<button class="tfng-btn" data-q="${item.id}" data-val="${label}" onclick="selectTFNG(this)">${label}</button>`).join('')}
      </div>
    </div>`).join('');
}

function renderMultipleChoice(sec) {
  return sec.items.map(q => `
    <div class="mc-item">
      <div class="mc-q"><span class="qn">${q.id}</span><span>${q.question}</span></div>
      <div class="options-list">
        ${q.options.map(opt => `<label class="opt-label"><input type="radio" name="q_${q.id}" value="${opt[0]}" data-q="${q.id}"><span>${opt}</span></label>`).join('')}
      </div>
    </div>`).join('');
}

function renderMatchingPool(pool) {
  return `<div class="match-pool"><div class="match-pool-title">${pool.title}</div>${pool.items.map(i=>`<div class="match-pool-item">${i}</div>`).join('')}</div>`;
}

function renderMatchingHeadings(sec) {
  let h = renderMatchingPool(sec.pool);
  h += sec.items.map(item => `
    <div class="match-row">
      <span class="qn">${item.id}</span><span class="match-label">${item.label}</span>
      <select class="drop" data-q="${item.id}"><option value="">Select...</option>${sec.poolLabels.map(l=>`<option value="${l}">${l}</option>`).join('')}</select>
    </div>`).join('');
  return h;
}

function renderMatchingFeatures(sec) {
  let h = renderMatchingPool(sec.pool);
  h += sec.items.map(item => `
    <div class="match-row">
      <span class="qn">${item.id}</span><span class="match-label">${item.statement}</span>
      <select class="drop" data-q="${item.id}"><option value="">Select...</option>${sec.poolLabels.map(l=>`<option value="${l}">${l}</option>`).join('')}</select>
    </div>`).join('');
  return h;
}

function renderSentenceEndings(sec) {
  let h = renderMatchingPool(sec.pool);
  h += sec.items.map(item => `
    <div class="sent-ending-row">
      <span class="qn">${item.id}</span><span class="sent-stem">${item.stem} ...</span>
      <select class="drop" data-q="${item.id}"><option value="">Select...</option>${sec.poolLabels.map(l=>`<option value="${l}">${l}</option>`).join('')}</select>
    </div>`).join('');
  return h;
}

function renderSummaryCompletion(sec) {
  let inner = sec.blocks.map(block => {
    if (block.type === 'text') return `<span>${block.content}</span>`;
    if (block.type === 'q') return buildInputWrap(block.id, block.width);
    return '';
  }).join('');
  return `<div class="summary-block"><p><strong>${sec.summaryTitle||''}</strong></p><p style="margin-top:10px">${inner}</p></div>`;
}

function renderShortAnswer(sec) {
  return sec.items.map(item => `
    <div class="short-a-item">
      <span class="qn">${item.id}</span><span class="short-a-q">${item.question}</span>
      ${buildInputWrap(item.id, 180)}
    </div>`).join('');
}

function renderClassification(sec) {
  let h = `<div class="match-pool"><div class="match-pool-title">Categories</div>${sec.categories.map(c=>`<div class="match-pool-item">${c}</div>`).join('')}</div>`;
  h += `<table class="class-table"><thead><tr><th>Item</th><th>Category</th></tr></thead><tbody>`;
  sec.items.forEach(item => {
    h += `<tr><td><span class="qn">${item.id}</span> ${item.label}</td><td>
      <select class="drop" data-q="${item.id}"><option value="">Select...</option>${sec.categories.map(c=>`<option value="${c[0]}">${c}</option>`).join('')}</select>
    </td></tr>`;
  });
  h += `</tbody></table>`;
  return h;
}

function renderSection(sec) {
  let html = '';
  if (sec.instructions) html += `<div class="q-instructions">${sec.instructions}</div>`;
  if (sec.title) html += `<div class="q-section-title">${sec.title}</div>`;
  switch (sec.type) {
    case 'tfng': case 'ynng':       html += renderTFNG(sec); break;
    case 'multiple-choice':         html += renderMultipleChoice(sec); break;
    case 'matching-headings':       html += renderMatchingHeadings(sec); break;
    case 'matching-features':       html += renderMatchingFeatures(sec); break;
    case 'sentence-endings':        html += renderSentenceEndings(sec); break;
    case 'summary-completion':      html += renderSummaryCompletion(sec); break;
    case 'short-answer':            html += renderShortAnswer(sec); break;
    case 'classification':          html += renderClassification(sec); break;
    default: html += `<p style="color:var(--red)">Unknown: ${sec.type}</p>`;
  }
  return html;
}

/* ── Build all passage views ── */
function buildAll() {
  const mainArea = document.getElementById('main-area');
  const tabs = document.getElementById('passage-tabs');
  // Clear existing (keep notes-panel)
  const notesPanel = document.getElementById('notes-panel');
  mainArea.innerHTML = '';
  mainArea.appendChild(notesPanel);
  tabs.innerHTML = '';

  PASSAGES.forEach(p => {
    const wrap = document.createElement('div');
    wrap.id = `passage-view-${p.id}`;
    wrap.style.cssText = 'display:none;flex:1;overflow:hidden;flex-direction:row;';

    const leftPane = document.createElement('div');
    leftPane.className = 'passage-panel';
    leftPane.innerHTML = `
      <div class="passage-panel-inner" id="passage-body-${p.id}">
        <div class="passage-header">
          <div class="passage-label">Reading Passage ${p.id}</div>
          <div class="passage-title">${p.passage.title}</div>
          ${p.passage.subtitle ? `<div class="passage-subtitle">${p.passage.subtitle}</div>` : ''}
        </div>
        <hr style="border:none;border-top:1.5px solid var(--rule);margin:16px 0">
        <div class="passage-body">${renderPassageBody(p.passage.body)}</div>
      </div>`;

    const rightPane = document.createElement('div');
    rightPane.className = 'questions-panel';
    let qHtml = '';
    p.sections.forEach((sec, si) => {
      if (si > 0) qHtml += `<hr style="border:none;border-top:2px dashed var(--rule);margin:28px 0 22px">`;
      qHtml += `<div class="q-section">${renderSection(sec)}</div>`;
    });
    rightPane.innerHTML = `<div class="questions-panel-inner">${qHtml}</div>`;

    wrap.appendChild(leftPane);
    wrap.appendChild(rightPane);
    // Insert before notes-panel
    mainArea.insertBefore(wrap, notesPanel);

    const tab = document.createElement('button');
    tab.className = 'passage-tab';
    tab.id = `tab-${p.id}`;
    tab.textContent = `Passage ${p.id}`;
    tab.onclick = () => switchPassage(p.id);
    tabs.appendChild(tab);
  });
}

function switchPassage(pid) {
  currentPassage = pid;
  PASSAGES.forEach(p => {
    const view = document.getElementById(`passage-view-${p.id}`);
    const tab = document.getElementById(`tab-${p.id}`);
    if (view) view.style.display = p.id === pid ? 'flex' : 'none';
    if (tab) tab.classList.toggle('active', p.id === pid);
  });
  updateDock();
}

/* ── Navigation dock ── */
function collectAllQids() {
  const all = [];
  PASSAGES.forEach(p => p.sections.forEach(sec => gatherIds(sec, all)));
  return all;
}

function gatherIds(sec, arr) {
  const push = id => { if (!arr.includes(id)) arr.push(id); };
  if (['tfng','ynng'].includes(sec.type)) sec.items.forEach(i=>push(i.id));
  else if (sec.type==='multiple-choice') sec.items.forEach(i=>push(i.id));
  else if (['matching-headings','matching-features','sentence-endings'].includes(sec.type)) sec.items.forEach(i=>push(i.id));
  else if (sec.type==='summary-completion') sec.blocks.filter(b=>b.type==='q').forEach(b=>push(b.id));
  else if (sec.type==='short-answer') sec.items.forEach(i=>push(i.id));
  else if (sec.type==='classification') sec.items.forEach(i=>push(i.id));
}

function passageForQ(qid) {
  for (const p of PASSAGES) {
    const ids = []; p.sections.forEach(sec=>gatherIds(sec,ids));
    if (ids.includes(qid)) return p.id;
  }
  return 1;
}

function buildDock() {
  const dock = document.getElementById('q-dock');
  dock.innerHTML = '';
  collectAllQids().forEach(id => {
    const b = document.createElement('button');
    b.className = 'q-btn'; b.id = `qb-${id}`; b.textContent = id;
    b.onclick = () => jumpToQ(id);
    dock.appendChild(b);
  });
}

function updateDock() {
  collectAllQids().forEach(id => {
    const btn = document.getElementById(`qb-${id}`);
    if (btn) btn.classList.toggle('current-passage', passageForQ(id) === currentPassage);
  });
}

function jumpToQ(qid) {
  const pid = passageForQ(qid);
  if (currentPassage !== pid) switchPassage(pid);
  setTimeout(() => {
    const el = document.querySelector(`[data-q="${qid}"]`);
    if (el) { el.scrollIntoView({ behavior:'smooth', block:'center' }); el.focus && el.focus(); }
  }, 80);
}

/* ── TFNG ── */
function selectTFNG(btn) {
  const qid = btn.getAttribute('data-q');
  document.querySelectorAll(`.tfng-btn[data-q="${qid}"]`).forEach(b => {
    b.classList.remove('sel-T','sel-F','sel-NG','sel-Y','sel-N');
  });
  const colClass = {'TRUE':'sel-T','FALSE':'sel-F','NOT GIVEN':'sel-NG','YES':'sel-Y','NO':'sel-N'}[btn.getAttribute('data-val')] || '';
  btn.classList.add(colClass);
  const nb = document.getElementById(`qb-${qid}`);
  if (nb) nb.classList.add('answered');
  btn.closest('.tfng-item').dataset.answer = btn.getAttribute('data-val');
}

/* ── Input tracking ── */
function setupTracking() {
  document.addEventListener('input', onAnyChange);
  document.addEventListener('change', onAnyChange);
}
function onAnyChange(e) {
  const el = e.target;
  const qid = el.getAttribute('data-q');
  if (!qid) return;
  let answered = false;
  if (el.type==='text') answered = el.value.trim() !== '';
  else if (el.type==='radio') answered = el.checked;
  else if (el.tagName==='SELECT') answered = el.value !== '';
  const nb = document.getElementById(`qb-${qid}`);
  if (nb) nb.classList.toggle('answered', answered);
}

/* ── Save / Restore answers ── */
const LS_ANS = 'ielts_answers_v1';
function saveAnswers() {
  const data = {};
  // Text inputs
  document.querySelectorAll('input[type="text"][data-q]').forEach(el => {
    if (el.value.trim()) data[el.getAttribute('data-q')] = { type:'text', val: el.value };
  });
  // Radios
  document.querySelectorAll('input[type="radio"][data-q]:checked').forEach(el => {
    data[el.getAttribute('data-q')] = { type:'radio', val: el.value };
  });
  // Selects
  document.querySelectorAll('select[data-q]').forEach(el => {
    if (el.value) data[el.getAttribute('data-q')] = { type:'select', val: el.value };
  });
  // TFNG
  document.querySelectorAll('.tfng-item[data-answer]').forEach(el => {
    const btn = el.querySelector('.tfng-btn[class*="sel-"]');
    if (btn) data[btn.getAttribute('data-q')] = { type:'tfng', val: btn.getAttribute('data-val') };
  });
  localStorage.setItem(LS_ANS, JSON.stringify(data));
}

function restoreAnswers() {
  try {
    const data = JSON.parse(localStorage.getItem(LS_ANS) || '{}');
    Object.entries(data).forEach(([qid, entry]) => {
      if (entry.type === 'text') {
        const el = document.querySelector(`input[type="text"][data-q="${qid}"]`);
        if (el) { el.value = entry.val; const nb = document.getElementById(`qb-${qid}`); if (nb) nb.classList.add('answered'); }
      } else if (entry.type === 'radio') {
        const el = document.querySelector(`input[type="radio"][data-q="${qid}"][value="${entry.val}"]`);
        if (el) { el.checked = true; const nb = document.getElementById(`qb-${qid}`); if (nb) nb.classList.add('answered'); }
      } else if (entry.type === 'select') {
        const el = document.querySelector(`select[data-q="${qid}"]`);
        if (el) { el.value = entry.val; const nb = document.getElementById(`qb-${qid}`); if (nb) nb.classList.add('answered'); }
      } else if (entry.type === 'tfng') {
        const btn = document.querySelector(`.tfng-btn[data-q="${qid}"][data-val="${entry.val}"]`);
        if (btn) selectTFNG(btn);
      }
    });
  } catch {}
}

// Auto-save every 5 seconds
setInterval(saveAnswers, 5000);
// Also save on visibility change
document.addEventListener('visibilitychange', saveAnswers);

/* ── Timer ── */
const LS_TIMER = 'ielts_timer_v1';
let secondsLeft = 60 * 60;
let timerRef = null;

function startTimer() {
  // Restore saved time
  const saved = parseInt(localStorage.getItem(LS_TIMER) || '3600');
  if (saved > 0 && saved <= 3600) secondsLeft = saved;

  const el = document.getElementById('timer');
  timerRef = setInterval(() => {
    const m = String(Math.floor(secondsLeft/60)).padStart(2,'0');
    const s = String(secondsLeft%60).padStart(2,'0');
    el.textContent = `${m}:${s}`;
    if (secondsLeft <= 300) el.classList.add('warn');
    localStorage.setItem(LS_TIMER, secondsLeft);
    if (secondsLeft <= 0) { clearInterval(timerRef); submitTest(); }
    secondsLeft--;
  }, 1000);
}

/* ── Submit & Scoring ── */
function getUserAnswer(id) {
  const allTfng = document.querySelectorAll('.tfng-item');
  for (const item of allTfng) {
    const btns = item.querySelectorAll('.tfng-btn');
    for (const btn of btns) {
      if (btn.getAttribute('data-q') == id) return (item.dataset.answer||'').toLowerCase();
    }
  }
  const text = document.querySelector(`input[type="text"][data-q="${id}"]`);
  if (text) return text.value.trim().toLowerCase();
  const radio = document.querySelector(`input[type="radio"][data-q="${id}"]:checked`);
  if (radio) return radio.value.trim().toLowerCase();
  const sel = document.querySelector(`select[data-q="${id}"]`);
  if (sel) return sel.value.trim().toLowerCase();
  return '';
}

function submitTest() {
  clearInterval(timerRef);
  saveAnswers();
  const ids = collectAllQids();
  let score = 0, log = '';
  ids.forEach(id => {
    const correct = ANSWER_KEY[id];
    if (correct === undefined) return;
    const userAns = getUserAnswer(id);
    const isOk = userAns === String(correct).toLowerCase();
    if (isOk) score++;
    log += `<div class="report-row">
      <span class="qn">${id}</span>
      <span class="${isOk?'ok':'no'}">${isOk?'✓':'✗'}</span>
      <span>Your: "<strong>${userAns||'[blank]'}</strong>"</span>
      ${!isOk?`<span style="color:var(--muted)">| Correct: "<strong>${correct}</strong>"</span>`:''}
    </div>`;
  });
  const band = calcBand(score, ids.length);
  document.getElementById('modal-body').innerHTML = `
    <p style="margin-bottom:8px">Score: <strong>${score} / ${ids.length}</strong></p>
    <div class="band-badge">Estimated Band: ${band}</div>
    <h4 style="margin-bottom:12px;border-bottom:1px solid var(--rule);padding-bottom:5px;font-family:var(--mono);font-size:0.8rem;letter-spacing:0.06em">REVIEW LOG</h4>${log}`;
  document.getElementById('modal').classList.add('active');
}

function calcBand(score, total) {
  const p = score/total;
  if (p>=0.975) return 9.0; if (p>=0.925) return 8.5; if (p>=0.875) return 8.0;
  if (p>=0.800) return 7.5; if (p>=0.750) return 7.0; if (p>=0.650) return 6.5;
  if (p>=0.575) return 6.0; if (p>=0.450) return 5.5; if (p>=0.350) return 5.0;
  return 4.0;
}

function closeModal() { document.getElementById('modal').classList.remove('active'); }

/* ── Keyboard shortcut: Escape closes context menu ── */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { hideCtxMenu(); closeNoteModal(); }
});

/* ── Init ── */
document.addEventListener('DOMContentLoaded', () => {
  buildAll();
  buildDock();
  setupTracking();
  switchPassage(1);
  startTimer();
  restoreAnswers();
  restoreHighlights();
  updateNotesPanel();
});
</script>
