<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monarchy - Fayl menejeri</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #ffffff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: #1C1C1E;
            height: 100vh;
            overflow: hidden;
        }

        .file-manager-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: white;
            border-radius: 0;
            overflow: hidden;
        }

        /* Toolbar */
        .file-toolbar {
            background: #ffffff;
            border-bottom: 1px solid #e9e9ef;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .path-bar {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f5f5f7;
            border-radius: 10px;
            padding: 6px 12px;
            min-width: 200px;
        }

        .path-bar i {
            color: #8E8E93;
            font-size: 14px;
        }

        .current-path {
            font-size: 13px;
            font-weight: 500;
            color: #1C1C1E;
            font-family: 'SF Mono', 'JetBrains Mono', monospace;
            flex: 1;
            overflow-x: auto;
            white-space: nowrap;
        }

        .path-up-btn {
            background: #f5f5f7;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            color: #007AFF;
            transition: all 0.2s ease;
        }

        .path-up-btn:hover {
            background: #e9e9ef;
        }

        .action-buttons {
            display: flex;
            gap: 6px;
        }

        .action-btn {
            background: #f5f5f7;
            border: none;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #1C1C1E;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .action-btn i {
            font-size: 14px;
        }

        .action-btn.primary {
            background: #007AFF;
            color: white;
        }

        .action-btn.primary:hover {
            background: #005fc1;
        }

        .action-btn:hover:not(.primary) {
            background: #e9e9ef;
        }

        /* Breadcrumb */
        .breadcrumb-bar {
            padding: 8px 16px;
            background: #fafafc;
            border-bottom: 1px solid #e9e9ef;
            display: flex;
            align-items: center;
            gap: 4px;
            overflow-x: auto;
            white-space: nowrap;
        }

        .breadcrumb-item {
            font-size: 12px;
            color: #8E8E93;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            transition: background 0.2s;
        }

        .breadcrumb-item:hover {
            background: #e9e9ef;
            color: #007AFF;
        }

        .breadcrumb-sep {
            color: #c6c6c8;
            font-size: 12px;
        }

        /* File list */
        .file-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        .file-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            cursor: pointer;
            transition: background 0.15s ease;
            border-bottom: 1px solid #f0f0f0;
        }

        .file-item:hover {
            background: #f5f5f7;
        }

        .file-icon {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #007AFF;
        }

        .file-icon.folder {
            color: #FF9500;
        }

        .file-icon.image {
            color: #34C759;
        }

        .file-icon.file {
            color: #8E8E93;
        }

        .file-info {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .file-name {
            font-weight: 500;
            font-size: 14px;
            color: #1C1C1E;
            min-width: 150px;
        }

        .file-size {
            font-size: 12px;
            color: #8E8E93;
        }

        .file-date {
            font-size: 12px;
            color: #8E8E93;
            margin-left: auto;
        }

        .file-perms {
            font-size: 11px;
            color: #8E8E93;
            font-family: monospace;
            background: #f5f5f7;
            padding: 2px 8px;
            border-radius: 6px;
        }

        /* Status bar */
        .status-bar {
            border-top: 1px solid #e9e9ef;
            padding: 6px 16px;
            background: #fafafc;
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #8E8E93;
        }

        /* Scrollbar */
        .file-list::-webkit-scrollbar {
            width: 6px;
        }

        .file-list::-webkit-scrollbar-track {
            background: #f0f0f0;
        }

        .file-list::-webkit-scrollbar-thumb {
            background: #c6c6c8;
            border-radius: 3px;
        }

        /* Loading indicator */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255,255,255,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .loading-spinner {
            width: 30px;
            height: 30px;
            border: 3px solid #e9e9ef;
            border-top-color: #007AFF;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #8E8E93;
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .file-info {
                flex-wrap: wrap;
            }
            .file-date {
                margin-left: 0;
                width: 100%;
                padding-left: 48px;
            }
            .file-perms {
                display: none;
            }
            .action-btn span {
                display: none;
            }
            .action-btn {
                padding: 6px 10px;
            }
        }
    </style>
</head>
<body>
    <div class="file-manager-container" id="fileManagerApp">
        <!-- Toolbar -->
        <div class="file-toolbar">
            <div class="path-bar">
                <i class="fas fa-folder-open"></i>
                <span class="current-path" id="currentPathDisplay">/</span>
            </div>
            <button class="path-up-btn" id="goUpBtn" title="Yuqori papkaga chiqish">
                <i class="fas fa-level-up-alt"></i>
            </button>
            <div class="action-buttons">
                <button class="action-btn" id="refreshBtn">
                    <i class="fas fa-sync-alt"></i>
                    <span>Yangilash</span>
                </button>
                <button class="action-btn primary" id="newFolderBtn">
                    <i class="fas fa-folder-plus"></i>
                    <span>Yangi papka</span>
                </button>
            </div>
        </div>

        <!-- Breadcrumb -->
        <div class="breadcrumb-bar" id="breadcrumbBar">
            <span class="breadcrumb-item" data-path="/">/</span>
        </div>

        <!-- File list -->
        <div class="file-list" id="fileList">
            <!-- JS orqali to'ldiriladi -->
            <div class="empty-state">
                <i class="fas fa-folder-open"></i>
                <p>Fayllar yuklanmoqda...</p>
            </div>
        </div>

        <!-- Status bar -->
        <div class="status-bar">
            <span id="statusInfo">Tayyor</span>
            <span id="itemCount">0 ta element</span>
        </div>
    </div>

    <script>
        /**
         * File Manager - Faqat shablon, real backend bilan ishlash uchun mo'ljallangan
         * Hozircha demo ma'lumotlar va event handlerlar tayyor
         * Asosiy sahifadagi WebSocket orqali real ma'lumot olinadi
         */
        
        (function() {
            // DOM elementlari
            const fileListEl = document.getElementById('fileList');
            const currentPathDisplay = document.getElementById('currentPathDisplay');
            const breadcrumbBar = document.getElementById('breadcrumbBar');
            const statusInfo = document.getElementById('statusInfo');
            const itemCountSpan = document.getElementById('itemCount');
            const goUpBtn = document.getElementById('goUpBtn');
            const refreshBtn = document.getElementById('refreshBtn');
            const newFolderBtn = document.getElementById('newFolderBtn');
            
            // Holat
            let currentPath = '/';
            let fileListData = [];
            let isLoading = false;
            
            // Demo ma'lumotlar (real backend bo'lmaganda ko'rinish uchun)
            const demoFiles = [
                { name: 'docs', type: 'dir', size: 0, modified: '2024-01-15 10:30', permissions: 'drwxr-xr-x' },
                { name: 'images', type: 'dir', size: 0, modified: '2024-01-14 15:20', permissions: 'drwxr-xr-x' },
                { name: 'script.sh', type: 'file', size: '1.2 KB', modified: '2024-01-10 09:15', permissions: '-rwxr-xr-x' },
                { name: 'config.json', type: 'file', size: '456 B', modified: '2024-01-12 11:45', permissions: '-rw-r--r--' },
                { name: 'log.txt', type: 'file', size: '2.3 MB', modified: '2024-01-13 08:00', permissions: '-rw-r--r--' },
                { name: 'photo.jpg', type: 'image', size: '128 KB', modified: '2024-01-09 14:22', permissions: '-rw-r--r--' },
                { name: 'video.mp4', type: 'video', size: '15.6 MB', modified: '2024-01-08 17:30', permissions: '-rw-r--r--' },
                { name: 'archive.zip', type: 'file', size: '3.1 MB', modified: '2024-01-07 12:00', permissions: '-rw-r--r--' }
            ];
            
            // Fayl ikonkasini aniqlash
            function getFileIcon(file) {
                if (file.type === 'dir') {
                    return '<i class="fas fa-folder"></i>';
                }
                
                const ext = file.name.split('.').pop().toLowerCase();
                if (['jpg', 'jpeg', 'png', 'gif', 'bmp', 'svg', 'webp'].includes(ext)) {
                    return '<i class="fas fa-file-image"></i>';
                }
                if (['mp4', 'mkv', 'avi', 'mov', 'wmv', 'flv'].includes(ext)) {
                    return '<i class="fas fa-file-video"></i>';
                }
                if (['mp3', 'wav', 'ogg', 'flac', 'aac'].includes(ext)) {
                    return '<i class="fas fa-file-audio"></i>';
                }
                if (['pdf'].includes(ext)) {
                    return '<i class="fas fa-file-pdf"></i>';
                }
                if (['doc', 'docx'].includes(ext)) {
                    return '<i class="fas fa-file-word"></i>';
                }
                if (['xls', 'xlsx', 'csv'].includes(ext)) {
                    return '<i class="fas fa-file-excel"></i>';
                }
                if (['zip', 'rar', '7z', 'tar', 'gz'].includes(ext)) {
                    return '<i class="fas fa-file-archive"></i>';
                }
                if (['sh', 'bash', 'zsh'].includes(ext)) {
                    return '<i class="fas fa-terminal"></i>';
                }
                if (['json', 'xml', 'yaml', 'yml'].includes(ext)) {
                    return '<i class="fas fa-code"></i>';
                }
                if (['txt', 'md', 'readme'].includes(ext)) {
                    return '<i class="fas fa-file-alt"></i>';
                }
                
                return '<i class="fas fa-file"></i>';
            }
            
            function getFileIconClass(file) {
                if (file.type === 'dir') return 'folder';
                const ext = file.name.split('.').pop().toLowerCase();
                if (['jpg', 'jpeg', 'png', 'gif', 'bmp', 'svg'].includes(ext)) return 'image';
                return 'file';
            }
            
            // Fayllarni render qilish
            function renderFileList(files, path) {
                if (!fileListEl) return;
                
                if (!files || files.length === 0) {
                    fileListEl.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-folder-open"></i>
                            <p>Bu papka bo'sh</p>
                        </div>
                    `;
                    itemCountSpan.textContent = '0 ta element';
                    return;
                }
                
                // Papkalarni birinchi chiqarish
                const sorted = [...files].sort((a, b) => {
                    if (a.type === 'dir' && b.type !== 'dir') return -1;
                    if (a.type !== 'dir' && b.type === 'dir') return 1;
                    return a.name.localeCompare(b.name);
                });
                
                let html = '';
                for (const file of sorted) {
                    const iconClass = getFileIconClass(file);
                    const iconHtml = getFileIcon(file);
                    const sizeDisplay = file.type === 'dir' ? '—' : (file.size || '0 B');
                    const dateDisplay = file.modified || '—';
                    
                    html += `
                        <div class="file-item" data-name="${escapeHtml(file.name)}" data-type="${file.type}">
                            <div class="file-icon ${iconClass}">
                                ${iconHtml}
                            </div>
                            <div class="file-info">
                                <span class="file-name">${escapeHtml(file.name)}</span>
                                <span class="file-size">${escapeHtml(sizeDisplay)}</span>
                                <span class="file-date">${escapeHtml(dateDisplay)}</span>
                                <span class="file-perms">${escapeHtml(file.permissions || '---')}</span>
                            </div>
                        </div>
                    `;
                }
                
                fileListEl.innerHTML = html;
                itemCountSpan.textContent = `${files.length} ta element`;
                
                // File item click eventlari
                document.querySelectorAll('.file-item').forEach(item => {
                    item.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const fileName = item.dataset.name;
                        const fileType = item.dataset.type;
                        const file = sorted.find(f => f.name === fileName);
                        if (fileType === 'dir') {
                            navigateTo(fileName);
                        } else {
                            // Fayl uchun action (masalan, ochish yoki yuklab olish)
                            statusInfo.textContent = `Fayl: ${fileName}`;
                            if (window.parent && window.parent.postMessage) {
                                window.parent.postMessage({
                                    type: 'file:open',
                                    path: currentPath + fileName,
                                    fileName: fileName
                                }, '*');
                            }
                        }
                    });
                });
            }
            
            function escapeHtml(str) {
                if (!str) return '';
                return str.replace(/[&<>]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    return m;
                });
            }
            
            // Breadcrumbni yangilash
            function updateBreadcrumb(path) {
                if (!breadcrumbBar) return;
                
                const parts = path === '/' ? [] : path.split('/').filter(p => p);
                let html = '';
                let accumulated = '';
                
                // Root element
                html += `<span class="breadcrumb-item" data-path="/">/</span>`;
                
                for (let i = 0; i < parts.length; i++) {
                    const part = parts[i];
                    accumulated += '/' + part;
                    html += `<span class="breadcrumb-sep"><i class="fas fa-chevron-right"></i></span>`;
                    html += `<span class="breadcrumb-item" data-path="${escapeHtml(accumulated)}">${escapeHtml(part)}</span>`;
                }
                
                breadcrumbBar.innerHTML = html;
                
                // Breadcrumb click eventlari
                document.querySelectorAll('.breadcrumb-item').forEach(el => {
                    el.addEventListener('click', (e) => {
                        const targetPath = el.dataset.path;
                        if (targetPath) {
                            loadDirectory(targetPath);
                        }
                    });
                });
            }
            
            // Yangi papka yaratish (demo)
            function createNewFolder() {
                const folderName = prompt('Yangi papka nomini kiriting:');
                if (folderName && folderName.trim()) {
                    statusInfo.textContent = `"${folderName}" papkasi yaratilmoqda...`;
                    // Real backend uchun: WebSocket orqali yuborish
                    if (window.parent && window.parent.postMessage) {
                        window.parent.postMessage({
                            type: 'file:mkdir',
                            path: currentPath,
                            name: folderName.trim()
                        }, '*');
                    }
                    // Demo uchun vaqtinchalik qo'shish
                    setTimeout(() => {
                        statusInfo.textContent = `"${folderName}" papkasi yaratildi (demo)`;
                        loadDirectory(currentPath); // Yangilash
                    }, 500);
                }
            }
            
            // Yuklash indikatori
            function showLoading(show) {
                isLoading = show;
                if (show) {
                    if (!document.querySelector('.loading-overlay')) {
                        const overlay = document.createElement('div');
                        overlay.className = 'loading-overlay';
                        overlay.innerHTML = '<div class="loading-spinner"></div>';
                        document.querySelector('.file-manager-container').appendChild(overlay);
                    }
                } else {
                    const overlay = document.querySelector('.loading-overlay');
                    if (overlay) overlay.remove();
                }
            }
            
            // Papkaga kirish
            function navigateTo(folderName) {
                let newPath = currentPath === '/' ? '/' + folderName : currentPath + '/' + folderName;
                newPath = newPath.replace(/\/\//g, '/');
                loadDirectory(newPath);
            }
            
            // Yuqoriga chiqish
            function goUp() {
                if (currentPath === '/') return;
                const parentPath = currentPath.substring(0, currentPath.lastIndexOf('/'));
                const newPath = parentPath === '' ? '/' : parentPath;
                loadDirectory(newPath);
            }
            
            // Papka mazmunini yuklash (asosiy funksiya)
            function loadDirectory(path) {
                if (isLoading) return;
                
                currentPath = path;
                currentPathDisplay.textContent = path;
                updateBreadcrumb(path);
                showLoading(true);
                statusInfo.textContent = 'Yuklanmoqda...';
                
                // Bu yerda asosiy sahifadagi WebSocket orqali backendga so'rov yuboriladi
                // Hozircha demo ma'lumotlar bilan ishlaymiz
                setTimeout(() => {
                    let files = [];
                    
                    // Agar path root bo'lsa, demo ma'lumotlar
                    if (path === '/') {
                        files = JSON.parse(JSON.stringify(demoFiles));
                        statusInfo.textContent = 'Papka mazmuni yuklandi (demo)';
                    } else if (path === '/docs') {
                        files = [
                            { name: 'report.pdf', type: 'file', size: '245 KB', modified: '2024-01-16 09:00', permissions: '-rw-r--r--' },
                            { name: 'presentation.pptx', type: 'file', size: '1.8 MB', modified: '2024-01-15 14:30', permissions: '-rw-r--r--' },
                            { name: 'notes.txt', type: 'file', size: '12 KB', modified: '2024-01-14 11:20', permissions: '-rw-r--r--' }
                        ];
                        statusInfo.textContent = 'docs papkasi mazmuni';
                    } else if (path === '/images') {
                        files = [
                            { name: 'wallpaper.jpg', type: 'image', size: '512 KB', modified: '2024-01-13 10:00', permissions: '-rw-r--r--' },
                            { name: 'icon.png', type: 'image', size: '45 KB', modified: '2024-01-12 15:45', permissions: '-rw-r--r--' },
                            { name: 'background.png', type: 'image', size: '1.2 MB', modified: '2024-01-11 09:30', permissions: '-rw-r--r--' }
                        ];
                        statusInfo.textContent = 'images papkasi mazmuni';
                    } else {
                        // Boshqa papkalar uchun bo'sh
                        files = [];
                        statusInfo.textContent = 'Papka bo\'sh';
                    }
                    
                    fileListData = files;
                    renderFileList(fileListData, currentPath);
                    showLoading(false);
                }, 300);
                
                // Asosiy sahifaga WebSocket orqali real so'rov yuborish
                if (window.parent && window.parent.postMessage) {
                    window.parent.postMessage({
                        type: 'file:list',
                        path: currentPath
                    }, '*');
                }
            }
            
            // Yangilash
            function refresh() {
                loadDirectory(currentPath);
            }
            
            // WebSocket dan kelgan xabarlarni qabul qilish (parent dan)
            window.addEventListener('message', function(event) {
                // Xavfsizlik: faqat o'zimizning origin dan qabul qilamiz (ixtiyoriy)
                const data = event.data;
                if (data && data.type) {
                    switch(data.type) {
                        case 'file:list:response':
                            if (data.path === currentPath && data.files) {
                                fileListData = data.files;
                                renderFileList(fileListData, currentPath);
                                showLoading(false);
                                statusInfo.textContent = 'Yangilandi';
                            }
                            break;
                        case 'file:mkdir:response':
                            if (data.success) {
                                statusInfo.textContent = 'Yangi papka yaratildi';
                                refresh();
                            } else {
                                statusInfo.textContent = 'Xatolik: ' + (data.error || 'Papka yaratilmadi');
                            }
                            break;
                        case 'file:delete:response':
                            if (data.success) {
                                statusInfo.textContent = 'O\'chirildi';
                                refresh();
                            }
                            break;
                        default:
                            break;
                    }
                }
            });
            
            // Event listenerlar
            if (goUpBtn) goUpBtn.addEventListener('click', goUp);
            if (refreshBtn) refreshBtn.addEventListener('click', refresh);
            if (newFolderBtn) newFolderBtn.addEventListener('click', createNewFolder);
            
            // Boshlang'ich yuklash
            loadDirectory('/');
            
            // Parent bilan aloqa o'rnatish (qurilma ID si haqida xabar)
            const urlParams = new URLSearchParams(window.location.search);
            const deviceId = urlParams.get('deviceId');
            if (deviceId && window.parent && window.parent.postMessage) {
                window.parent.postMessage({
                    type: 'file:ready',
                    deviceId: deviceId
                }, '*');
            }
        })();
    </script>
</body>
</html>
